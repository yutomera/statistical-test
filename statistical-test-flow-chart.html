t-danger);line-height:1.5;display:flex;align-items:center">r² < 0.05</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">実務的な予測力が極めて低い。この相関を施策設計に使うのは推奨しません。より相関の強い変数を探してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">r² = 0.05〜0.25</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">弱い予測力だが参考にはなる。単独では使わず、他の変数と組み合わせた複合スコアとして活用することを検討してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン3  相関なし</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">r=0.05, p=0.18</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">2変数の間に統計的に有意な線形関係は見られなかった。</strong><br>r=0.05は「ほぼゼロの相関」ですが、非線形な関係が存在する可能性は残っています。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">散布図でU字・逆U字・閾値効果がないか確認する</strong>：線形相関ゼロでも「歩数5,000歩未満はログイン少なく、5,000歩以上は急増する」という非線形関係がある場合があります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">Spearman rhoでも確認する</strong>：Pearsonで相関なしでもSpearmanで相関がある場合は、単調増加だが線形でない関係があることを示します。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「相関がない」は施策設計に使えないことを示す</strong>：この2変数をセットでターゲティングに使う根拠がないということです。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「線形の関係がない」という結果だけでは「関係がない」とは言えません。非線形・閾値効果の確認をすることで「特定の条件下では関係がある」という有用な知見が得られる可能性があります。それが見つかれば、閾値を活用したセグメント設計ができます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">散布図で非線形パターンがないか確認</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">Spearman rhoでも確認</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">散布図でU字・逆U字の関係</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">線形の相関はないが曲線的な関係がある。閾値を設けた分析や二乗項を加えた回帰分析を検討してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">Spearman rhoも低い</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">単調な関係もない。2変数間に有意な関係はない可能性が高い。別の変数の組み合わせを探してください。</div></div></div></div></div></div></div>`,
r_spearman:`<h3>どんな場面で使うか</h3><p>外れ値が多いデータ（購入金額・LTVなど）や順序変数（会員ランク・満足度スコア）の相関を調べます。Pearson 相関係数のノンパラメトリック版です。</p><div class="ex-box"><span class="exl">典型的な使用例</span>・LTVとポイント消費額の相関（外れ値が多い）<br>・会員ランクとアプリ満足度（5段階）の相関<br>・購入回数と継続日数の相関</div><div style="background:rgba(0,0,0,0.025);border-radius:8px;padding:12px 14px;margin:4px 0 12px 0"><div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:8px">外れ値の影響 → 順位変換で軽減するイメージ</div><svg viewBox="0 0 320 110" width="100%" height="110" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"><line x1="20" y1="95" x2="150" y2="95" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><line x1="20" y1="10" x2="20" y2="95" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><line x1="170" y1="95" x2="310" y2="95" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><line x1="170" y1="10" x2="170" y2="95" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><circle cx="56" cy="65" r="2" fill="#D4843ABB"/><circle cx="68" cy="71" r="2" fill="#D4843ABB"/><circle cx="81" cy="66" r="2" fill="#D4843ABB"/><circle cx="68" cy="52" r="2" fill="#D4843ABB"/><circle cx="66" cy="78" r="2" fill="#D4843ABB"/><circle cx="57" cy="71" r="2" fill="#D4843ABB"/><circle cx="78" cy="60" r="2" fill="#D4843ABB"/><circle cx="83" cy="51" r="2" fill="#D4843ABB"/><circle cx="89" cy="61" r="2" fill="#D4843ABB"/><circle cx="85" cy="61" r="2" fill="#D4843ABB"/><circle cx="65" cy="60" r="2" fill="#D4843ABB"/><circle cx="72" cy="68" r="2" fill="#D4843ABB"/><circle cx="93" cy="60" r="2" fill="#D4843ABB"/><circle cx="66" cy="67" r="2" fill="#D4843ABB"/><circle cx="96" cy="69" r="2" fill="#D4843ABB"/><circle cx="79" cy="61" r="2" fill="#D4843ABB"/><circle cx="77" cy="62" r="2" fill="#D4843ABB"/><circle cx="66" cy="70" r="2" fill="#D4843ABB"/><circle cx="70" cy="70" r="2" fill="#D4843ABB"/><circle cx="80" cy="53" r="2" fill="#D4843ABB"/><circle cx="145" cy="32" r="2" fill="#D4843ABB"/><circle cx="145" cy="33" r="2" fill="#D4843ABB"/><circle cx="130" cy="15" r="4" fill="#D45B5B"/><circle cx="140" cy="18" r="4" fill="#D45B5B"/><text x="80" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">① 元データ（外れ値あり）</text><text x="240" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">② 順位変換後（外れ値の影響軽減）</text><circle cx="219" cy="66" r="2" fill="#2B9B78BB"/><circle cx="217" cy="43" r="2" fill="#2B9B78BB"/><circle cx="235" cy="58" r="2" fill="#2B9B78BB"/><circle cx="230" cy="12" r="2" fill="#2B9B78BB"/><circle cx="276" cy="51" r="2" fill="#2B9B78BB"/><circle cx="225" cy="68" r="2" fill="#2B9B78BB"/><circle cx="226" cy="30" r="2" fill="#2B9B78BB"/><circle cx="254" cy="64" r="2" fill="#2B9B78BB"/><circle cx="220" cy="71" r="2" fill="#2B9B78BB"/><circle cx="251" cy="35" r="2" fill="#2B9B78BB"/><circle cx="286" cy="61" r="2" fill="#2B9B78BB"/><circle cx="213" cy="64" r="2" fill="#2B9B78BB"/><circle cx="245" cy="74" r="2" fill="#2B9B78BB"/><circle cx="207" cy="75" r="2" fill="#2B9B78BB"/><circle cx="265" cy="69" r="2" fill="#2B9B78BB"/><circle cx="257" cy="80" r="2" fill="#2B9B78BB"/><circle cx="260" cy="58" r="2" fill="#2B9B78BB"/><circle cx="220" cy="76" r="2" fill="#2B9B78BB"/><circle cx="266" cy="61" r="2" fill="#2B9B78BB"/><circle cx="245" cy="69" r="2" fill="#2B9B78BB"/><circle cx="178" cy="62" r="2" fill="#2B9B78BB"/><circle cx="178" cy="60" r="2" fill="#2B9B78BB"/><line x1="160" y1="10" x2="160" y2="102" stroke="#8A8A8A" stroke-width="0.5" stroke-dasharray="4,3" opacity="0.5"/></svg></div><h3>データ構成</h3><div style="font-size:11.5px;line-height:1.7;color:var(--color-text-secondary);margin-bottom:8px">検定を実行するために、以下の形式にデータを準備してください。</div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">① 元データの形（1行 = 1ユーザー）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">ltv</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">point_spend</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">12,400</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">3,200</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">2,100</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">800</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U003</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">284,000</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">48,000</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U004</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">5,800</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1,400</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">2つの指標列（ltv、point_spend）が同じ行に並んでいればOKです。欠損値のある行は除外してください。</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">② 欠損値を除外（加工コード）</div><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:7px 10px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.85;margin:5px 0">df_clean = df[['ltv','point_spend']].dropna()<br>x = df_clean['ltv']<br>y = df_clean['point_spend']</div></div><h3>実行手順</h3><div style="margin-top:4px"><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">1</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">散布図を描いて外れ値を確認する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">import matplotlib.pyplot as plt<br>plt.scatter(df['ltv'], df['point_spend'], alpha=0.3)<br>plt.xlabel('LTV')<br>plt.ylabel('ポイント消費額')<br>plt.show()</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">確認ポイント</div>VIPユーザーなど極端な外れ値があることが多いですが、Spearman は順位ベースのため影響を受けにくいです。</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">2</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">Spearman 順位相関係数を計算する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">from scipy import stats<br>rho, p_value = stats.spearmanr(df['ltv'], df['point_spend'])<br>print('ρ=', round(rho,3), 'p値=', round(p_value,4))</div><div style="background:var(--color-background-success);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.7;margin:6px 0"><strong style="color:var(--color-text-primary)">結果の読み方</strong><br>|ρ| ≥ 0.7 → 強い ／ 0.4〜0.7 → 中程度 ／ 0.2〜0.4 → 弱い ／ &lt;0.2 → ほぼなし<br>p値 &lt; 0.05 → 相関が統計的に有意</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">3</span></div><div style="padding-left:10px;padding-bottom:4px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">結果をまとめる</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">報告例</div>LTV とポイント消費額の間に中程度の正の相関が認められた（Spearman ρ=0.48、p&lt;0.001）。</div><div style="font-size:11px;color:var(--color-text-danger);margin-top:6px">⚠ <strong style="color:var(--color-text-primary)">相関 ≠ 因果</strong>。また全体の相関とセグメント内の相関は異なる場合があります（シンプソンのパラドックス）。</div></div></div></div></div><h3>結果の読み方・解釈パターン</h3><div style="margin-top:4px"><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン1  中程度の正の相関</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">ρ=0.48, p<0.001, n=3,000</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">LTVとポイント消費額の間に中程度の正の順位相関が確認できた。外れ値の影響を除いた頑健な評価。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「LTVが高い順にポイント消費額も高い傾向がある」という施策根拠が得られた</strong>：LTV上位25%ユーザーへのポイント消費促進施策は、下位25%ユーザーへの施策より効果が高い可能性があります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">ρ=0.48はVIPユーザーを除いた「一般ユーザーでの関係」を示している</strong>：Pearson rよりも実態に即した相関係数として報告できます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">相関は因果でない（特に購買行動では交絡が多い）</strong>：継続期間が長いユーザーがLTVもポイント消費も高いという第三変数（継続年数）の可能性があります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">Spearman相関係数の解釈目安</strong>：ρ=0.7〜1.0: 強い / 0.4〜0.7: 中程度 / 0.2〜0.4: 弱い / &lt;0.2: ほぼなし</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「交絡を除いた後も相関が残るか」を確認しないと、「LTVが高いから施策に反応しやすい」のか「継続年数が長いからLTVもポイント消費も高いだけ」なのかが区別できません。この区別によって、施策のターゲットを「LTV高ユーザー」にすべきか「継続年数が長いユーザー」にすべきかが変わります。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">偏相関係数で交絡変数（会員ランク・継続期間）を調整</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">LTV分位点ごとの消費額中央値を集計</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">偏相関も0.3以上を維持</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">交絡を除いてもLTVとポイント消費の関係は実在する。LTV高ユーザーへのポイント消費促進施策は有効と判断できます。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">偏相関が0.1以下に低下</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">相関の大部分が交絡変数で説明されていた。継続年数ごとのセグメント別施策が有効かもしれません。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">LTV上位25%で消費額中央値が突出</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ヘビーユーザー層へのポイント消費促進施策が最大の売上インパクトを生みます。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン2  PearsonとSpearmanの値が大きく違う</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">Pearson r=0.82 vs Spearman ρ=0.41</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">外れ値（VIPユーザー）がPearson rを大きく引き上げている状態。ρ=0.41が「本来の相関の強さ」に近い。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">Pearson r=0.82を「強い相関」として報告するのは誤り</strong>：この値はVIPユーザー数名によって膨らんでいる可能性が高く、一般ユーザーへの施策設計に使うには過大評価です。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">Spearmanのρ=0.41を「外れ値を除いた本来の相関」として使える</strong>：「VIPユーザーを除いた場合、LTVとポイント消費の相関は中程度（ρ=0.41）」という報告ができます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">VIPユーザーが売上の何%を占めるかを確認する</strong>：VIP10人が全売上の30%を占めるなら、その10人への施策設計が全体最適かもしれません。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">Pearsonの値で施策判断をすると、VIPユーザー数名の影響で「相関が強い変数」と誤って判断してしまいます。外れ値ユーザーを特定して「VIP向け施策」と「一般ユーザー向け施策」を分けて設計することで、それぞれに最適な施策が打てます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">外れ値（VIPユーザー）を特定し除外前後で比較</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">外れ値除外後にr≒ρ</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">VIPユーザーを除いた一般ユーザー向け施策の効果をρ=0.41で評価できる。VIPは別施策として独立して管理することを推奨します。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">VIPユーザーが売上の30%以上を占める</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">VIP専用の深掘り分析を別途実施し、VIPリテンション施策を優先してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン3  相関なし（両変数ともに確認済み）</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">ρ=0.06, p=0.21</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">2変数の間に単調な順位関係は見られなかった。</strong><br>SpearmanもPearsonも低い場合は、2変数間に有意な単調関係がないことが示されています。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">この2変数をセットにした施策設計の根拠がない</strong>：LTVの高さだけで「ポイント消費が多い」とは言えない状態です。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">U字型・閾値型の非単調関係がある可能性</strong>：「LTV中程度でポイント消費が最大になる」ような逆U字の関係は、Spearmanでも検出できません。散布図を確認してください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「相関がない」は有用な知見でもある</strong>：「LTVとポイント消費は独立して動く指標」という理解のもと、それぞれ独立した施策を設計することが適切です。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「単調な関係がない」という結果だけでは「完全に無関係」とは言えません。散布図で非単調パターンを確認することで「特定の条件下では関係がある」という有用な知見が得られる可能性があります。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">散布図で非単調パターンがないか確認</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">散布図でU字・逆U字の関係</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">単調関係はないが曲線的な関係がある。LTVをカテゴリ化（低・中・高）してKruskal-Wallis検定で再分析することを推奨します。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">完全に無関係</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">2変数間に有意な関係はない。施策の優先変数を別途特定することが必要です。</div></div></div></div></div></div></div>`,
r_logrank:`<h3>どんな場面で使うか</h3><p>「解約・購入・失効までの日数」を2グループ以上で比較します。途中でデータが切れたユーザー（打ち切り）を適切に扱えます。</p><div class="ex-box"><span class="exl">典型的な使用例</span>・プランAとBで解約までの期間に差があるか<br>・施策あり vs なし のアプリ継続日数の比較<br>・登録経路別の初回購入までの日数の比較</div><div style="background:rgba(0,0,0,0.025);border-radius:8px;padding:12px 14px;margin:4px 0 12px 0"><div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:8px">Kaplan-Meier継続率曲線のイメージ</div><svg viewBox="0 0 320 115" width="100%" height="115" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"><line x1="40" y1="95" x2="305" y2="95" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><line x1="40" y1="10" x2="40" y2="95" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><text x="160" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">経過日数</text><text x="16" y="57" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">継続率</text><path d="M 40 22 H 66 V 24 H 93 V 27 H 120 V 30 H 146 V 33 H 199 V 38 H 252 V 43 H 305 V 47" fill="none" stroke="#4B8FD4" stroke-width="2"/><path d="M 40 22 H 66 V 27 H 93 V 33 H 120 V 39 H 146 V 45 H 199 V 51 H 252 V 57 H 305 V 62" fill="none" stroke="#D4843A" stroke-width="2"/><text x="310" y="47" text-anchor="start" font-family="sans-serif" font-size="8.5" fill="#4B8FD4">プランA</text><text x="310" y="62" text-anchor="start" font-family="sans-serif" font-size="8.5" fill="#D4843A">プランB</text><text x="35" y="25" text-anchor="end" font-family="sans-serif" font-size="7.5" fill="#8A8A8A">73%</text><text x="35" y="43" text-anchor="end" font-family="sans-serif" font-size="7.5" fill="#8A8A8A">55%</text><text x="35" y="61" text-anchor="end" font-family="sans-serif" font-size="7.5" fill="#8A8A8A">36%</text><text x="35" y="80" text-anchor="end" font-family="sans-serif" font-size="7.5" fill="#8A8A8A">18%</text></svg></div><h3>データ構成</h3><div style="font-size:11.5px;line-height:1.7;color:var(--color-text-secondary);margin-bottom:8px">検定を実行するために、以下の形式にデータを準備してください。</div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">① 元データの形（1行 = 1ユーザー）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">plan</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">duration</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">event</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">A</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">180</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">A</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">365</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U003</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">B</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">92</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U004</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">B</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">365</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">duration: 登録日から解約日（または分析終了日）までの日数。event: 1=解約した、0=まだ継続中（打ち切り）。</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">② duration / event の作り方（加工コード）</div><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:7px 10px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.85;margin:5px 0">import pandas as pd<br>analysis_end = pd.Timestamp('2024-12-31')<br><br># 解約ユーザー: event=1, duration=解約日-登録日<br>df['event']    = df['churn_date'].notna().astype(int)<br>df['end_date'] = df['churn_date'].fillna(analysis_end)<br>df['duration'] = (df['end_date'] - df['reg_date']).dt.days</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">③ 検定に渡すデータの形（group ごとに分割）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">group</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">duration例</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">event例</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">A群</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">[180, 365, 240, …]</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">[1, 0, 1, …]</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">B群</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">[92, 365, 140, …]</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">[1, 0, 0, …]</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">group_a["duration"] / group_a["event"] のように group 別に Series を用意します。</div></div><h3>実行手順</h3><div style="margin-top:4px"><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">1</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">データを用意する（日数 + イベント発生フラグ）</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0"># duration: 観察日数（解約日 or 分析終了日まで）<br># event:    1=解約した, 0=まだ継続中（打ち切り）<br>group_a = df[df['plan']=='A'][['duration','event']]<br>group_b = df[df['plan']=='B'][['duration','event']]</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">打ち切りとは</div>分析終了日時点でまだ解約していないユーザーの event=0。<br>これを適切に扱えることがこの手法の強みです。</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">2</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">Kaplan-Meier 曲線を描く</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">from lifelines import KaplanMeierFitter  # pip install lifelines<br>import matplotlib.pyplot as plt<br>ax = None<br>for plan, grp in [('A', group_a), ('B', group_b)]:<br>    kmf = KaplanMeierFitter().fit(grp['duration'], grp['event'], label=f'プラン{plan}')<br>    ax = kmf.plot_survival_function(ax=ax)<br>plt.title('継続率の推移'); plt.show()</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">曲線の見方</div>縦軸: 継続率（0〜1） / 横軸: 日数<br>曲線が下がるほど離脱が早い ／ ＋マーク: 打ち切りユーザー</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">3</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">ログランク検定を実行する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">from lifelines.statistics import logrank_test<br>result = logrank_test(<br>    group_a['duration'], group_b['duration'],<br>    group_a['event'],    group_b['event'])<br>print('p値:', round(result.p_value,4))</div><div style="background:var(--color-background-success);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.7;margin:6px 0"><strong style="color:var(--color-text-primary)">結果の読み方</strong><br>p値 &lt; 0.05 → 2群間の継続率に有意差あり<br>p値 ≥ 0.05 → 差があるとは言えない</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">4</span></div><div style="padding-left:10px;padding-bottom:4px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">結果をまとめる</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">報告例</div>プランA（n=500）とプランB（n=480）の解約までの期間を比較した結果、両群間に有意差が認められた（ログランク検定、p=0.023）。<br>6か月時点の継続率はプランA 72%、プランB 61%であった。</div><div style="font-size:11px;color:var(--color-text-tertiary);margin-top:6px">複数要因を調整して比較したい場合は Cox 比例ハザードモデルを使います。</div></div></div></div></div><h3>結果の読み方・解釈パターン</h3><div style="margin-top:4px"><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン1  有意差あり・プランAが高継続</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">p=0.023, 6か月継続率: A=72%, B=61%</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">プランAはプランBより有意に高い継続率を示した。差11ポイントは実務的にも意味のある大きさ。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「6か月時点での継続率11ポイント差」を具体的な数値として示せる</strong>：1,000人に適用した場合、プランAはプランBより110人多くサービスを継続します。1人あたりのLTVを掛ければ経済的インパクトが算出できます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">Kaplan-Meier曲線は視覚的な説明ツールとして強力</strong>：経営向けのプレゼンで曲線を見せるだけで「プランAの方が継続率が高い」ことが直感的に伝わります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「有意差あり」は群間のすべての時点で差があることを意味しない</strong>：初期は差がなく後半に広がるパターンや、その逆のパターンもあります。曲線の形状を確認してください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">打ち切りユーザーが多いと結果の信頼性が下がる</strong>：観察終了時点でまだ継続中（event=0）のユーザーが50%以上いる場合は、継続率の比較には注意が必要です。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">報告</strong>：「ログランク検定（p=0.023）。Kaplan-Meier曲線による6か月継続率: A群72%、B群61%。」</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「プランの差」が継続率の差をもたらしているのか、「ユーザー属性の差」が原因なのかを区別しないと、施策変更の根拠として弱い状態です。Cox比例ハザードモデルで交絡調整をすることで「プラン自体の純粋な効果」が定量化でき、施策コストとLTVインパクトの比較ができます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">Cox比例ハザードモデルで交絡調整後のHRを算出</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">継続率差×平均月次売上でLTVインパクトを試算</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">Cox調整後もHR < 0.7</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">年齢・ログイン頻度を調整してもプランAの優位性が確認できた。施策変更の根拠として使えます。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">Cox調整後にHRが1に近づく</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">プランの差ではなくユーザー属性の差が継続率を説明していた可能性。属性別のパーソナライズ施策が有効かもしれません。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">LTVインパクトが施策コストを上回る</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">統計的有意 + 経済的有意の両方が確認できた。プランAへの移行推進を意思決定できる状態です。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン2  カーブが途中で交差する</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">3か月まではA優位、それ以降カーブが交差</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">Kaplan-Meier曲線が交差している場合、ログランク検定の解釈に注意が必要。</strong><br>ログランク検定は「全期間を通じて一方が優位」という場合に最も威力を発揮します。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">カーブが交差する場合、ログランク検定のp値は信頼性が低下する</strong>：「全期間通してA群が優位か」という問いへの回答にはなりません。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「短期と長期で有利なプランが異なる」という重要な示唆</strong>：短期（3か月以内）ではAが優位、長期ではBが優位という可能性があります。ユーザーの継続動機が時間とともに変化しているかもしれません。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">比例ハザード性の仮定が崩れている可能性</strong>：カーブが交差する場合はCox比例ハザードモデルも使用できないケースがあります。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">カーブが交差する原因と時期を特定することで「短期に効果が集中する施策」の活用方針が決まります。例えば「3か月以内の継続率改善にはプランAを使い、長期ユーザーへはプランBを使う」という段階的設計が可能になります。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">時点を分割した層別ログランク検定</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">RMST（制限付き平均生存時間）の比較</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">前半（0-3か月）のみA優位</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">3か月以内の継続率改善にはプランAが有効。「最初の3か月」をターゲットにした施策設計が有効です。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">後半（3か月以降）でBが逆転</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">長期ユーザーへの施策設計にはプランBが適している可能性。初期プランA→長期プランBという段階的なプラン設計を検討してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン3  有意差なし</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">p=0.31, 6か月継続率: A=68%, B=64%</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">2つのプランで継続率に有意差は認められなかった。差は4ポイントだが統計的に主張できない。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「4ポイント差は存在している」という事実は残る</strong>：有意でなくても、1,000人に適用した場合の差は40人です。ビジネス規模によっては実務的に意味があるかもしれません。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">イベント数（解約件数）の不足が最も多い原因</strong>：両群合計でイベントが40件未満の場合、検出力が著しく低いです。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">正しい報告</strong>：「ログランク検定（p=0.31）。6か月継続率A群68%、B群64%の間に統計的有意差は認められなかった。」</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「有意差なし＝プランに差がない」とは言えません。イベント数（解約件数）が不足していた場合は、観察期間を延ばすことで有意差が出る可能性があります。またサブグループ分析をすると「新規ユーザーのみ」では有意差がある可能性があり、施策の有効な対象を特定できます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">イベント数の確認。各群20件未満なら検出力不足</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">イベント数 < 20件/群</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">解約件数が少なく差を検出できなかった。観察期間を延ばすか複合アウトカムを定義して再分析してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">十分なイベント数があって差なし</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">両プランで継続率に実質的な差がない可能性が高い。プラン設計そのものの見直しを検討してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">サブグループ（新規ユーザーのみ）で有意差あり</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">全体では差がなくても新規ユーザーにはプランAが有効。新規ユーザーの初期プラン設計に注力することを推奨します。</div></div></div></div></div></div></div>`,
r_linear:`<h3>どんな場面で使うか</h3><p>連続変数のアウトカムに対して、複数の要因が同時にどれだけ影響しているかを数値化します。「他の要因を一定にした場合」の影響を評価できます。</p><div class="ex-box"><span class="exl">典型的な使用例</span>・年齢・ランク・ログイン頻度を調整した上で「週間歩数」に最も影響する要因を特定<br>・登録経路・デバイス・キャンペーン参加有無を調整した上で「月間購入金額」を分析</div><div style="background:rgba(0,0,0,0.025);border-radius:8px;padding:12px 14px;margin:4px 0 12px 0"><div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:8px">回帰直線：ログイン回数 → 週間歩数への影響</div><svg viewBox="0 0 300 110" width="100%" height="110" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"><line x1="30" y1="95" x2="285" y2="95" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><line x1="30" y1="10" x2="30" y2="95" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><text x="150" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">ログイン回数</text><text x="14" y="55" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">週間歩数</text><circle cx="159" cy="23" r="2.2" fill="#8B78D4CC"/><circle cx="122" cy="40" r="2.2" fill="#8B78D4CC"/><circle cx="147" cy="44" r="2.2" fill="#8B78D4CC"/><circle cx="224" cy="12" r="2.2" fill="#8B78D4CC"/><circle cx="154" cy="31" r="2.2" fill="#8B78D4CC"/><circle cx="197" cy="23" r="2.2" fill="#8B78D4CC"/><circle cx="177" cy="41" r="2.2" fill="#8B78D4CC"/><circle cx="143" cy="48" r="2.2" fill="#8B78D4CC"/><circle cx="108" cy="73" r="2.2" fill="#8B78D4CC"/><circle cx="97" cy="63" r="2.2" fill="#8B78D4CC"/><circle cx="150" cy="44" r="2.2" fill="#8B78D4CC"/><circle cx="158" cy="52" r="2.2" fill="#8B78D4CC"/><circle cx="153" cy="37" r="2.2" fill="#8B78D4CC"/><circle cx="183" cy="37" r="2.2" fill="#8B78D4CC"/><circle cx="142" cy="65" r="2.2" fill="#8B78D4CC"/><circle cx="138" cy="69" r="2.2" fill="#8B78D4CC"/><circle cx="105" cy="46" r="2.2" fill="#8B78D4CC"/><circle cx="77" cy="60" r="2.2" fill="#8B78D4CC"/><circle cx="168" cy="37" r="2.2" fill="#8B78D4CC"/><circle cx="173" cy="26" r="2.2" fill="#8B78D4CC"/><circle cx="194" cy="26" r="2.2" fill="#8B78D4CC"/><circle cx="135" cy="53" r="2.2" fill="#8B78D4CC"/><circle cx="120" cy="52" r="2.2" fill="#8B78D4CC"/><circle cx="128" cy="37" r="2.2" fill="#8B78D4CC"/><circle cx="89" cy="76" r="2.2" fill="#8B78D4CC"/><circle cx="122" cy="74" r="2.2" fill="#8B78D4CC"/><circle cx="224" cy="38" r="2.2" fill="#8B78D4CC"/><circle cx="146" cy="48" r="2.2" fill="#8B78D4CC"/><line x1="40" y1="77" x2="282" y2="20" stroke="#D45B5B" stroke-width="1.5" opacity="0.8"/><text x="220" y="19" text-anchor="start" font-family="sans-serif" font-size="8.5" fill="#D45B5B">y = a + bx</text></svg></div><h3>データ構成</h3><div style="font-size:11.5px;line-height:1.7;color:var(--color-text-secondary);margin-bottom:8px">検定を実行するために、以下の形式にデータを準備してください。</div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">① 元データの形（1行 = 1ユーザー）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">steps（目的変数）</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">age</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">rank</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">login_count</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">7,200</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">34</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">bronze</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">12</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">9,800</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">28</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">gold</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">24</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U003</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">5,100</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">45</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">silver</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">8</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">目的変数（steps）と説明変数（age・rank・login_count）を横に並べます。</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">② カテゴリ変数のダミー変換 + 欠損除去（加工コード）</div><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:7px 10px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.85;margin:5px 0">import pandas as pd, statsmodels.api as sm<br><br># カテゴリ変数をダミー変数に変換（drop_first=True で多重共線性を回避）<br>df_model = pd.get_dummies(df[['steps','age','rank','login_count']],<br>                          columns=['rank'], drop_first=True).dropna()<br><br>y = df_model['steps']<br>X = sm.add_constant(df_model.drop(columns='steps'))</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">③ 検定に渡すデータの形</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">steps（y）</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">age</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">login_count</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">rank_silver</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">rank_gold</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">7,200</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">34</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">12</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">9,800</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">28</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">24</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U003</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">5,100</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">45</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">8</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">rank_silver / rank_gold はダミー変数（0/1）。rank_bronze は基準カテゴリとして省略されます。</div></div><h3>実行手順</h3><div style="margin-top:4px"><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">1</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">データを用意する（カテゴリ変数はダミー変数に変換）</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">import pandas as pd<br>df_model = pd.get_dummies(<br>    df[['steps','age','rank','login_count']],<br>    columns=['rank'], drop_first=True)<br>print(df_model.describe())</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">事前確認</div>欠損値がある行は除外するか補完してください。<br>サンプル数 ÷ 投入する変数数 ≥ 15 を確認してください。</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">2</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">重回帰分析を実行する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">import statsmodels.api as sm<br>X = sm.add_constant(df_model[['age','login_count','rank_silver','rank_gold']])<br>y = df_model['steps']<br>model = sm.OLS(y, X).fit()<br>print(model.summary())</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">出力の主要部分</div>coef（係数）: 1単位増えたときのアウトカムへの影響<br>P&gt;|t|（p値）: 0.05未満 → その変数が有意に影響<br>R-squared: モデル全体の説明力（0〜1、高いほど良い）</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span
