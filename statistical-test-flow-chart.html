style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">3</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">係数を解釈する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">係数の例</div>login_count の coef=42.3 → ログイン1回増えるごとに歩数が +42.3歩<br>rank_gold の coef=380.2 → ゴールド会員はブロンズ比で歩数が +380.2歩</div><div style="background:var(--color-background-success);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.7;margin:6px 0"><strong style="color:var(--color-text-primary)">多重共線性の確認</strong><br>from statsmodels.stats.outliers_influence import variance_inflation_factor<br>VIF &gt; 10 の変数がある場合は多重共線性の問題あり → その変数の除外を検討</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">4</span></div><div style="padding-left:10px;padding-bottom:4px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">結果をまとめる</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">報告例</div>重回帰分析の結果、ログイン回数（β=42.3、p&lt;0.001）および会員ランク（ゴールド: β=380.2、p&lt;0.01）が週間歩数に有意な正の影響を示した（R²=0.34）。</div></div></div></div></div><h3>結果の読み方・解釈パターン</h3><div style="margin-top:4px"><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン1  特定の変数が有意・係数が大きい</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">login_count: β=42.3, p<0.001, R²=0.34</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">ログイン回数は週間歩数に有意なプラスの影響を持つ（他変数を一定にした場合）。</strong><br>モデル全体でR²=0.34：歩数のばらつきの34%をこのモデルで説明できています。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「ログイン1回増加 → 歩数+42.3歩」という定量的な施策根拠が得られた</strong>：ログイン促進施策を設計する際の期待効果の目安として使えます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「他の変数を一定にしても」という点が多変量解析の価値</strong>：年齢・ランクが同じ条件でもログイン回数が多い人ほど歩数が多いことを示しています。単純な相関よりも施策根拠として強い。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">β係数は「1単位増加の効果」なので単位に注意</strong>：ログイン回数が1回増えて+42.3歩なら、10回増えれば+423歩。施策でどれだけログイン回数を増やせるかとセットで解釈してください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">回帰係数は因果係数ではない</strong>：「ログインを増やせば歩数が増える」という因果関係は確認されていません。交絡変数の残存可能性を常に意識してください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">R²=0.34は中程度の説明力</strong>：歩数の66%は別の要因（天気・健康状態・職業など）で動いています。予測精度を上げるには追加の特徴量が必要です。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「複数の変数の中でどれが最も重要か」を比較するためには、単位の異なる変数同士を標準化した係数で比較する必要があります。また「ゴールド会員ではログインの効果が特に大きいのか」を交互作用項で確認することで、施策を特定セグメントに絞るべきかどうかが判断できます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">標準化偏回帰係数で変数間の重要度を比較</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">交互作用項を検討（ログイン×ランク）</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">因果推論のための設計検討</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">標準化係数がlogin_count最大</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ログイン促進が歩数向上の最も効果的なレバーと確認できた。施策の重点投資先として採用できます。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">標準化係数が中程度（2〜3位）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ログインは重要だが他の変数も同程度に重要。複合施策が有効かもしれません。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">ゴールド×ログインの交互作用が有意</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ゴールド会員でログイン促進施策の効果が特に大きい。ゴールド会員に絞った施策で最大のROIが見込めます。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">交互作用が非有意</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">全ランクでログインの効果は均一。ランク問わず全体施策として展開できます。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン2  有意だが係数が小さい</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">age: β=0.8, p=0.04, 標準化β=0.04</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">年齢は歩数に有意な影響があるが、係数は極めて小さい（1歳で+0.8歩）。</strong><br>統計的有意性と実務的重要性が乖離している典型例。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">年齢1歳の違いで歩数+0.8歩は実務上無意味</strong>：30歳と50歳で+16歩の差しかない計算です。これを施策の変数として使う価値はありません。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">標準化係数=0.04という低い値が「重要でない」ことを示す</strong>：他変数（ログイン回数の標準化係数が0.45など）と比較すると、年齢の影響力がいかに小さいかが分かります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「統計的有意 ≠ 実務的重要」の好例</strong>：n=50,000では年齢0.8歩の関係でもp=0.04になります。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「有意だが係数が小さい」変数を施策設計に使ってしまうと、年齢を軸にしたセグメント施策に無駄なコストを投じる可能性があります。標準化係数を比較して「どの変数が実際に重要か」を明確にし、投資すべき施策変数を絞ることが必要です。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">標準化偏回帰係数で重要度を比較</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">年齢の二乗項・カテゴリ化を検討</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">標準化係数が0.05以下</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">実務的な影響力が極めて低い変数。施策設計には使いにくい。モデルの解釈を簡単にするために除外を検討してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">年齢カテゴリ化後に係数が大きくなる</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">線形でない年齢効果がある可能性。20代・30代・40代以上などのカテゴリで再分析してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン3  多重共線性の問題</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">VIF > 10 の変数が存在（login_count: VIF=14.2）</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">ログイン回数とセッション時間など、説明変数間の相関が強すぎて係数推定が不安定。</strong><br>VIF > 10 の変数を含む回帰係数は信頼性が低い状態です。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">この状態での係数解釈は危険</strong>：多重共線性がある場合、係数の符号が理論と逆になったり、有意でない変数が有意になったりすることがあります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">R²は正確でもβ係数は不安定</strong>：モデル全体の予測力（R²）は多重共線性の影響を受けにくいですが、個別係数の解釈はできません。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">相関が高い変数ペアを特定することが先決</strong>：login_countとsession_timeのような「測っているものが重なる変数」を同時に入れることが原因です。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">VIF > 10 の状態で係数を施策設計に使うと、「ログイン回数を増やすと歩数が減る（符号が逆になった偽の係数）」などの誤った施策根拠を作ってしまう可能性があります。問題変数を除外または合成することで、信頼できる係数に基づく施策設計ができるようになります。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">相関行列で問題変数を特定し除外</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">VIF > 10 の変数を除外または主成分分析（PCA）で合成</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">除外後にVIF < 5・係数が安定</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">多重共線性が解消された。モデルの係数が信頼できる状態になりました。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">PCA合成後に解釈が困難</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">統計的な問題は解決したが実務解釈が難しくなった。ビジネス上重要でない変数を優先して除外し、解釈可能なモデルを維持することを推奨します。</div></div></div></div></div></div></div><div class="warn-box"><strong style="color:var(--color-text-primary)">注意：</strong>① VIF で多重共線性を確認 ② 残差の正規性・等分散性を確認 ③ カテゴリ変数はダミー変数に変換</div>`,

:8px">検定を実行するために、以下の形式にデータを準備してください。</div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">① 元データの形（1行 = 1ユーザー）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">churn（目的変数）</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">age</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">rank</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">login_count</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0（継続）</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">34</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">bronze</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">12</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1（解約）</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">28</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">gold</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">2</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U003</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0（継続）</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">45</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">silver</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">18</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">churn は 0（継続）/ 1（解約）の2値。チャーンユーザー数 ÷ 10 ≥ 投入する変数数 を確認してください。</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">② カテゴリ変数のダミー変換 + 欠損除去（加工コード）</div><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:7px 10px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.85;margin:5px 0">import pandas as pd, statsmodels.api as sm<br><br>df_model = pd.get_dummies(df[['churn','age','rank','login_count']],<br>                          columns=['rank'], drop_first=True).dropna()<br><br>y = df_model['churn']<br>X = sm.add_constant(df_model.drop(columns='churn'))</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">③ 検定に渡すデータの形</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">churn（y）</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">age</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">login_count</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">rank_silver</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">rank_gold</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">34</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">12</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">28</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">2</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U003</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">45</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">18</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">churn 列が 0/1 の2値になっていることを必ず確認してください。</div></div><h3>実行手順</h3><div style="margin-top:4px"><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">1</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">データを用意する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">import pandas as pd<br>df_model = pd.get_dummies(<br>    df[['churn','age','login_count','rank','has_notification']],<br>    columns=['rank'], drop_first=True)<br>print('チャーン率:', round(df_model['churn'].mean(), 3))</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">サンプル数の確認</div>チャーンユーザー数 ÷ 10 ≥ 投入する変数数 を確認してください。<br>例：チャーン200人 → 変数は最大20個まで</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">2</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">ロジスティック回帰を実行する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">import statsmodels.api as sm<br>X = sm.add_constant(df_model[['age','login_count','rank_silver','rank_gold','has_notification']])<br>y = df_model['churn']<br>model = sm.Logit(y, X).fit()<br>print(model.summary())</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">出力の主要部分</div>coef（係数）: 対数オッズへの影響<br>P&gt;|z|（p値）: 0.05未満 → 有意に影響<br>exp(coef): これがオッズ比（OR）</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">3</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">オッズ比（OR）を計算・解釈する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">import numpy as np<br>print('オッズ比:')<br>print(np.exp(model.params).round(3))</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">解釈の例</div>login_count の OR=0.82 → ログイン1回増えるごとに解約リスクが 18% 低下<br>rank_gold の OR=0.45 → ゴールド会員はブロンズ比で解約リスクが 55% 低い</div><div style="background:var(--color-background-success);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.7;margin:6px 0"><strong style="color:var(--color-text-primary)">ORの読み方</strong><br>OR &gt; 1 → リスク上昇 ／ OR = 1 → 関連なし ／ OR &lt; 1 → リスク低下（保護的）</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">4</span></div><div style="padding-left:10px;padding-bottom:4px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">結果をまとめる</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">報告例</div>ロジスティック回帰の結果、ログイン回数（OR=0.82、95%CI: 0.78–0.87、p&lt;0.001）およびゴールド会員（OR=0.45、95%CI: 0.31–0.65、p&lt;0.001）が解約リスクの低下と有意に関連した。</div></div></div></div></div><h3>結果の読み方・解釈パターン</h3><div style="margin-top:4px"><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン1  OR<1：保護的因子</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">login_count OR=0.82, 95%CI[0.78-0.87], p<0.001</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">ログイン回数が増えるほど解約リスクが下がる（保護的因子）。</strong><br>ログイン1回増えるごとに解約オッズが18%低下します。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「ログイン×回施策 → 解約率X%減少」というシミュレーションができる</strong>：例えば平均ログイン回数を月5回から7回に増やせる施策があれば、解約オッズが(0.82²)=0.67倍=33%低下という見込みが立てられます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">95%CI[0.78-0.87]が1をまたいでいないため、効果の方向は確実</strong>：「ログイン増加が解約リスクを下げる方向性」は信頼性が高いです。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">OR=0.82は「他の変数を一定にした場合」の値</strong>：ログイン回数が増えやすい属性（ゴールド会員・若年層）の効果を取り除いた上での推定です。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">解約オッズ低下 ≠ 解約率低下（特に発生率が低い場合）</strong>：解約率が2%の場合、オッズ比の変化を確率変化に換算すると約(0.82-1)×2%=−0.36%の解約率低下です。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「ログインを増やす施策はどのユーザーに最も有効か」を確認することで、施策の費用対効果を最大化できます。新規ユーザーと既存ユーザーでORが大きく異なる場合、オンボーディング施策に集中すべきか、既存ユーザーのリテンション施策に集中すべきかが判断できます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">95%信頼区間の確認</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">施策効果のシミュレーション：ログイン+2回で解約率がどう変わるか</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">コホート別ORの確認（新規vs既存ユーザー）</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">95%CI が狭い（例：[0.78, 0.87]）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">推定精度が高い。OR=0.82を信頼して施策のROI試算を経営報告に使えます。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">ログイン+2回で解約率1%以上低下（試算）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">解約1件の損失と比べてROIがプラスなら、ログイン促進施策への投資を優先してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">新規ユーザーでORが特に小さい</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">新規ユーザーの初期ログイン促進（オンボーディング強化）が最も効果的な解約抑制手段と特定できます。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">既存ユーザーでORが1に近い</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">既存ユーザーには別の解約要因が支配的。解約アンケートや行動ログから他の要因を探してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン2  OR>1：リスク因子</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">last_login_days OR=1.08, 95%CI[1.03-1.13], p=0.002</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">最終ログインからの経過日数が増えるほど解約リスクが上昇（リスク因子）。</strong><br>1日増えるごとに解約オッズが8%上昇します。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「何日ログインなし → 解約リスクが何倍」という自動アラート設計が可能</strong>：OR=1.08の場合、10日未ログインでオッズが(1.08^10)=2.16倍、30日で10.1倍になります。14日をアラートトリガーとして設定するなどの具体的設計ができます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">OR=1.08は「線形に増加」という仮定に基づく</strong>：実際には「7日で急増するが、それ以降は緩やか」というような非線形の関係があるかもしれません。スプライン分析で変曲点を確認してください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">因果に注意：「ログインしない → 解約」なのか「解約を決めた → ログインしない」なのかは不明</strong>：後者の場合、介入タイミングが遅すぎる可能性があります。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「いつ介入すれば最も解約を防げるか」という介入トリガーの設計には、リスクが急増する変曲点（何日未ログインからリスクが急増するか）を特定することが必要です。線形と仮定したままでは最適な介入タイミングを見逃します。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">介入トリガーの閾値設計（何日でアラート？）</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">スプライン回帰でリスクが急増する変曲点を探す</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">変曲点が7日</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">7日間ログインなしでアラートを送ることが最も効果的なリテンション介入タイミングです。自動化（チャーンアラートの設定）を優先してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">変曲点が30日</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">30日間未ログインまでは解約リスクが急増しない。過度な通知を減らしつつ30日前後でのリテンション施策を強化してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">介入後に解約率低下（A/Bテストで確認）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">変曲点でのアラート施策が有効と実証できた。自動トリガー施策として本番化してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン3  AUCで予測精度を確認</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">AUC=0.76（ロジスティック回帰モデル）</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">モデル全体の識別精度はAUC=0.76で「許容できる精度」のレベル。</strong><br>解約ユーザーの76%をランダムより高い確率で正しく識別できます。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">AUC=0.76は「解約リスク上位X%に介入」という施策設計に使える</strong>：例えばスコア上位20%（高リスク）へ集中的に介入することで、全ユーザーに介入するより効率よく解約を抑制できます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">AUC=0.76は「完璧ではない」ことも認識する</strong>：100人の高リスクユーザーに介入しても、実際に解約するのはそのうちの一部です。介入コストと期待効果をバランスさせてください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">クラス不均衡に注意</strong>：解約率が5%以下の場合、AUCは過大評価されやすい。PR曲線（Precision-Recall）も合わせて確認してください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">AUCの解釈目安</strong>：0.9-1.0: 非常に優秀 / 0.8-0.9: 良好 / 0.7-0.8: 許容できる / 0.5: ランダムと同等</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">AUCだけでは「介入する閾値（カットオフ）をどこに設定すべきか」が分かりません。介入コストと解約1件の損失を定義してカットオフを最適化することで「最も利益の大きい介入設計」が実現できます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">PR曲線（Precision-Recall曲線）も確認</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">ビジネスコストを考慮したカットオフ決定</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">特徴量重要度の確認</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">PR-AUCも0.5以上（クラス不均衡でも有効）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">不均衡データでも十分な識別性能。上位リスクユーザーへの集中介入が費用対効果の高い施策になります。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">ビジネスコスト最適カットオフで利益最大化</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">スコア上位X%への介入が経済的に最適な戦略として特定できた。介入施策の自動化を進めてください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">カットオフを変えても利益が変わらない</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">モデルの精度が実用水準を下回っているか、介入施策自体の効果が弱い可能性。モデル改善と介入施策見直しを並行して進めてください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン4  有意だが実務的に無意味な変数</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">gender OR=1.02, p=0.03</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">性別は有意だがOR=1.02という極めて小さな差。大規模サンプルによる統計的有意性の罠。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">OR=1.02は「男性の方が解約オッズが2%高い」という意味だが、実務的には無視してよいレベル</strong>：性別での施策差別化を設計するほどの根拠にはなりません。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">大規模サンプルでは小さな差でも有意になる</strong>：n=100,000では OR=1.01 でも有意になります。OR の値自体を見て実務的な判断をしてください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「施策採用のORの閾値」を事前に定義することが重要</strong>：例えば「OR &lt; 0.8 または &gt; 1.25 のみ施策に反映する」という基準を設けると、このような「有意だが無意味」変数を排除できます。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">有意だが実務的に無意味な変数をモデルに残したままにすると、意思決定者が「性別での施策差別化が必要だ」と誤解する可能性があります。除外してもAUCが変わらない場合は、よりシンプルで解釈しやすいモデルとして運用できます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">ビジネス上の有意性（Practical Significance）の基準設定</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">モデルの簡略化を検討</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">有意でも実務的に無意味な変数を除外後もAUCが変わらない</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">変数を絞ってもモデル精度が維持された。よりシンプルで解釈しやすいモデルとして運用できます。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">除外後にAUCが低下</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">統計的には弱くても予測に貢献していた。除外ではなく係数の解釈時に「実務的に小さな効果」と補足する形で残す判断もあります。</div></div></div></div></div></div></div><div class="warn-box"><strong style="color:var(--color-text-primary)">注意：</strong>予測精度（AUC）も合わせて確認してください。有意でない変数でもビジネス上重要な交絡因子はモデルに残すことがあります。</div>`,
