rtiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">必要n >> 実際のn（10倍以上）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">そもそも差を検出できる設計になっていなかった。次回は事前にサンプル数を計算してから実施してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">必要n ≒ 実際のn</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">十分なサンプルで差が出なかった。施策の内容が弱いか本当に差がない可能性が高い。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">施策強化後の再テストで有意差</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">施策の強度が足りなかったと判断できます。最小有効施策の強度を今回の結果から逆算して設計してください。</div></div></div></div></div></div></div><div class="warn-box"><strong style="color:var(--color-text-primary)">よくある間違い：</strong>同一ユーザーの前後比較にカイ二乗検定を使ってしまう → 正しくは <strong style="color:var(--color-text-primary)">McNemar 検定</strong>を使います。</div>`,
r_fisher:`<h3>どんな場面で使うか</h3><p>カイ二乗検定の期待度数条件（全セル5以上）を満たさない場合に使います。発生率が低いイベントや小規模テストで有効です。</p><div class="ex-box"><span class="exl">典型的な使用例</span>・各群n=30程度の小規模テストでクーポン利用率を比較<br>・解約率0.5%など発生率の低いイベントの比較<br>・期待度数条件を満たさないセルがある場合</div><div style="background:rgba(0,0,0,0.025);border-radius:8px;padding:12px 14px;margin:4px 0 12px 0"><div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:8px">小規模テストの比率比較</div><svg viewBox="0 0 280 100" width="100%" height="100" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"><line x1="20" y1="85" x2="270" y2="85" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><rect x="48" y="39" width="30" height="46" fill="#2B9B78" opacity="0.7" rx="2"/><rect x="82" y="65" width="30" height="20" fill="#8A8A8A" opacity="0.35" rx="2"/><text x="80" y="97" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">新UI（n=20）</text><rect x="158" y="62" width="30" height="23" fill="#D4843A" opacity="0.7" rx="2"/><rect x="192" y="43" width="30" height="42" fill="#8A8A8A" opacity="0.35" rx="2"/><text x="190" y="97" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">旧UI（n=20）</text><text x="140" y="8" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#8A8A8A">小規模テストでもFisher正確検定で正確なp値が得られます</text></svg></div><h3>データ構成</h3><div style="font-size:11.5px;line-height:1.7;color:var(--color-text-secondary);margin-bottom:8px">検定を実行するために、以下の形式にデータを準備してください。</div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">① 元データの形（1行 = 1ユーザー）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">group</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">purchased</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">A</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">A</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U003</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">B</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U004</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">B</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">purchased は 0（なし）/ 1（あり）の2値変数。group 列でA/Bを区別します。</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">② クロス集計表（分割表）に変換（加工コード）</div><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:7px 10px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.85;margin:5px 0">import pandas as pd<br>ct = pd.crosstab(df['group'], df['purchased'])<br># → 行=group（A/B）、列=purchased（0/1）の2×2テーブルになります</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">③ 検定に渡すデータの形（分割表）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left"></th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">0（なし）</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">1（あり）</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">A群</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">680</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">320</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">B群</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">740</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">260</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">全セルの期待度数が5以上か確認してください（fisher_exact の場合は不要）。</div></div><h3>実行手順</h3><div style="margin-top:4px"><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">1</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">分割表を作る</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">import numpy as np<br>table = np.array([[14, 6],   # 新UI群：利用あり14, なし6<br>                  [ 7, 13]])  # 旧UI群：利用あり7, なし13</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">2</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">期待度数を確認する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">from scipy.stats import chi2_contingency<br>_, _, _, expected = chi2_contingency(table)<br>print(expected.round(1))</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">5未満のセルがある場合</div>→ カイ二乗検定は使えません。Fisher 正確検定を使います。</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">3</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">Fisher 正確検定を実行する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">from scipy.stats import fisher_exact<br>odds_ratio, p_value = fisher_exact(table, alternative='two-sided')<br>print('オッズ比:', round(odds_ratio,3), 'p値:', round(p_value,4))</div><div style="background:var(--color-background-success);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.7;margin:6px 0"><strong style="color:var(--color-text-primary)">結果の読み方</strong><br>p値 &lt; 0.05 → 2群間に有意差あり<br>p値 ≥ 0.05 → 差があるとは言えない</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">4</span></div><div style="padding-left:10px;padding-bottom:4px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">結果をまとめる</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">報告例</div>新UI群のクーポン利用率は 70%（14/20）、旧UI群は 35%（7/20）であり、両群間に有意差が認められた（Fisher 正確検定、p=0.048）。</div></div></div></div></div><h3>結果の読み方・解釈パターン</h3><div style="margin-top:4px"><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン1  有意差あり（小規模テスト）</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">p=0.048, 新UI: 14/20件(70%) vs 旧UI: 7/20件(35%)</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">小規模テストでも統計的に有意な差が確認できた。ただし信頼区間が広いことに注意。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">利用率の差は+35ポイントと大きく、実務的にも意味がある可能性</strong>：小規模でも差が「あると言える」だけの根拠は得られています。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">n=20では95%信頼区間が非常に広い</strong>：例えばオッズ比4.3の95%CIが[1.01, 18.4]になることがある。真の効果は1倍〜18倍と振れ幅が大きい。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">p=0.048は「ギリギリ有意」</strong>：追加データを集めると有意でなくなる可能性があります。大規模検証で確認することを強く推奨します。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">報告</strong>：「Fisher正確検定、p=0.048（両側）、オッズ比=4.33（95%CI: 1.01-18.4）。新UI70%、旧UI35%。」</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">小規模テストの結果はn=20程度では信頼区間が非常に広く、本当の効果が「わずかな差」から「圧倒的な差」まで幅広い可能性があります。本番展開の前に大規模検証で「本当に効果が再現するか」を確認することが必要です。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">オッズ比と95%信頼区間を必ず報告</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">大規模検証（n=300以上）への移行</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">95%CI が広い（例：[1.0, 18]）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">点推定は有意でも信頼区間が広く、実際の効果は大きく振れる可能性があります。大規模検証で信頼区間を絞ってから本番判断をしてください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">大規模検証でも有意差あり（CI が狭くなる）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">効果が小規模・大規模の両方で再現できた。本番展開の強い根拠になります。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">大規模検証では有意差なし</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">小規模テストの結果は偶然だった可能性。施策の採用は見送り、別のアプローチを検討してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン2  有意差なし（サンプルが少なすぎる）</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">p=0.14, 新UI: 8/20件(40%) vs 旧UI: 5/20件(25%)</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">有意差なし。ただし+15ポイントという大きな差が存在しており、検定力不足が強く疑われます。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「差なし」と「差が検出できなかった」は別</strong>：40%vs25%の差は実務的に意味がある大きさですが、n=20では検出できません。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">p=0.14は「差がない証拠」ではない</strong>：有意でないp値は「差がある証拠がない」ことを示すだけで、「差がない証拠」にはなりません。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">このテスト結果だけで施策判断をしてはいけない</strong>：サンプルを増やして再テストすることが必要です。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">15ポイントという大きな差が存在しているのに「有意差なし」という結果になったのは、n=20というサンプル数が少なすぎることが原因です。必要サンプル数を計算することで「あと何人集めれば有意差が出るか」が分かり、テスト継続 vs 再設計の判断ができます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">必要サンプル数の計算</strong>：利用率差+15%を検出するために必要なnを算出。</span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">必要n = 60〜80程度</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">あと40〜60人追加すれば差が検出できる可能性。テスト継続か再設計して実施することを推奨します。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">必要n > 500</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">大規模なテストが必要。コストを考慮した上でA/Bテストの設計を再検討してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン3  発生率が低すぎるイベント</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">解約: A群5人 vs B群2人（各群5,000人）、発生率0.1%</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">サンプルが多くても発生率が低すぎて、差を検出できる状態にない。</strong><br>解約7件の差は統計的に議論できるほどの情報量がありません。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">発生率0.1%では数万人規模でも差を検出するのは困難</strong>：解約率0.1%で5%差（0.1%→0.05%）を検出するには両群合計で数百万人必要です。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「解約した人の数」ではなく「解約率の比率」で考える</strong>：5人vs2人という絶対数ではなく0.10%vs0.04%という確率で比較することが必要です。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">このケースではKaplan-Meier曲線 + ログランク検定が適切</strong>：解約までの「時間」も含めた生存分析で「解約が起きるまでの早さ」の差を検定できます。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">発生率が低いイベントは「より多くの情報」が集まらないと差を検出できません。アウトカムの再定義（複合イベント化）や観察期間の延長で「十分な情報量」を確保することが必要です。そうしないと、本当は差がある施策を見逃し続けることになります。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">複合アウトカムの設計</strong>：「解約 OR 30日以上ログインなし」など発生率を高める複合イベントを定義。</span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">観察期間の延長</strong>：十分なイベント数（各群20件以上）が集まるまで観察を続けてください。</span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">複合アウトカムで発生率10%以上</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">より広い「リスクシグナル」で早期介入が可能になった。「30日未ログイン」ユーザーへの介入はコストパフォーマンスが高い場合があります。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">観察期間延長後に各群20件以上</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">十分なイベント数が集まったため、Fisher正確検定または対応するログランク検定で適切に比較できます。</div></div></div></div></div></div></div>`,
r_paired_t:`<h3>どんな場面で使うか</h3><p>同一ユーザーの施策前後を比較します。ユーザーIDで前後のデータを紐付けて「差」を計算します。</p><div class="ex-box"><span class="exl">典型的な使用例</span>・新機能リリース前後の同一ユーザーの週間歩数<br>・ポイント還元率アップ前後の月間購入金額<br>・通知文言変更前後のアプリ起動回数</div><div style="background:rgba(0,0,0,0.025);border-radius:8px;padding:12px 14px;margin:4px 0 12px 0"><div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:8px">同一ユーザーの施策前後変化（各線 = 1ユーザー）</div><svg viewBox="0 0 320 100" width="100%" height="100" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"><line x1="50" y1="90" x2="290" y2="90" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><text x="80" y="99" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#8A8A8A">施策前</text><text x="220" y="99" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#8A8A8A">施策後</text><line x1="80" y1="40" x2="220" y2="55" stroke="#2B9B78" stroke-width="0.8" opacity="0.5"/><circle cx="80" cy="40" r="3" fill="#2B9B78"/><circle cx="220" cy="55" r="3" fill="#2B9B78"/><line x1="80" y1="48" x2="220" y2="60" stroke="#2B9B78" stroke-width="0.8" opacity="0.5"/><circle cx="80" cy="48" r="3" fill="#2B9B78"/><circle cx="220" cy="60" r="3" fill="#2B9B78"/><line x1="80" y1="32" x2="220" y2="48" stroke="#2B9B78" stroke-width="0.8" opacity="0.5"/><circle cx="80" cy="32" r="3" fill="#2B9B78"/><circle cx="220" cy="48" r="3" fill="#2B9B78"/><line x1="80" y1="55" x2="220" y2="66" stroke="#2B9B78" stroke-width="0.8" opacity="0.5"/><circle cx="80" cy="55" r="3" fill="#2B9B78"/><circle cx="220" cy="66" r="3" fill="#2B9B78"/><line x1="80" y1="25" x2="220" y2="40" stroke="#2B9B78" stroke-width="0.8" opacity="0.5"/><circle cx="80" cy="25" r="3" fill="#2B9B78"/><circle cx="220" cy="40" r="3" fill="#2B9B78"/><line x1="80" y1="43" x2="220" y2="52" stroke="#2B9B78" stroke-width="0.8" opacity="0.5"/><circle cx="80" cy="43" r="3" fill="#2B9B78"/><circle cx="220" cy="52" r="3" fill="#2B9B78"/><line x1="80" y1="38" x2="220" y2="45" stroke="#2B9B78" stroke-width="0.8" opacity="0.5"/><circle cx="80" cy="38" r="3" fill="#2B9B78"/><circle cx="220" cy="45" r="3" fill="#2B9B78"/><line x1="80" y1="52" x2="220" y2="64" stroke="#D45B5B" stroke-width="0.8" opacity="0.5"/><circle cx="80" cy="52" r="3" fill="#D45B5B"/><circle cx="220" cy="64" r="3" fill="#D45B5B"/><text x="150" y="8" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">← 多くのユーザーで歩数が増加（線が上方向）</text></svg></div><h3>データ構成</h3><div style="font-size:11.5px;line-height:1.7;color:var(--color-text-secondary);margin-bottom:8px">検定を実行するために、以下の形式にデータを準備してください。</div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">① 元データの形（縦持ち：1行 = 1ユーザー × 1時点）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">period</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">steps</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">before</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">6,800</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">after</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">7,500</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">before</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">8,200</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">after</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">9,100</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">同一 user_id が before と after の2行ずつ存在する形式。BQやDWHでよく見られます。</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">② 検定用に横持ちに変換（加工コード）</div><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:7px 10px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.85;margin:5px 0"># 縦持ち → 横持ちに変換<br>wide = df.pivot(index='user_id', columns='period', values='steps')<br>before = wide['before'].dropna()<br>after  = wide['after'].dropna()<br># 両方揃っているユーザーのみ使用（自動的に共通のユーザーになります）</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">③ 検定に渡すデータの形（横持ち）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">steps_before</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">steps_after</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">6,800</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">7,500</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">8,200</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">9,100</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">同一 user_id の before / after がセットになっている必要があります。</div></div><h3>実行手順</h3><div style="margin-top:4px"><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">1</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">ユーザーIDで前後データを紐付ける</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">before = df[df['period']=='before'].set_index('user_id')['steps']<br>after  = df[df['period']=='after'].set_index('user_id')['steps']<br># 同一ユーザーのみに絞る<br>common = before.index.intersection(after.index)<br>before, after = before[common], after[common]<br>print('対象ユーザー数:', len(before), '人')</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">2</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">差のデータを計算・確認する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">diff = after - before<br>print('差の平均:', round(diff.mean(),1))<br>print('差の中央値:', round(diff.median(),1))<br>diff.hist(bins=30)  # 差のヒストグラムを確認</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">正規性の確認（n ≦ 2000）</div>from scipy import stats<br>_, p_norm = stats.shapiro(diff)<br>print('Shapiro-Wilk p値:', round(p_norm,4))<br># p ≥ 0.05 → 正規性あり → 対応t検定OK</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">3</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">対応のある t 検定を実行する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">from scipy import stats<br>stat, p_value = stats.ttest_rel(before, after)<br>print('t統計量:', round(stat,3), 'p値:', round(p_value,4))</div><div style="background:var(--color-background-success);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.7;margin:6px 0"><strong style="color:var(--color-text-primary)">結果の読み方</strong><br>p値 &lt; 0.05 → 施策前後に有意な変化あり<br>p値 ≥ 0.05 → 有意な変化があるとは言えない</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">4</span></div><div style="padding-left:10px;padding-bottom:4px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">結果をまとめる</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">報告例</div>新機能リリース前後で同一ユーザー（n=500）の週間歩数を比較した結果、前 7,150±2,800 歩 → 後 7,800±2,700 歩へ有意に増加した（対応のある t 検定、p&lt;0.001）。</div></div></div></div></div><h3>結果の読み方・解釈パターン</h3><div style="margin-top:4px"><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン1  有意差あり・施策後に増加</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">t=5.19, p<0.001, 前: 7,150歩 → 後: 7,800歩（差+650歩）</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">同一ユーザーの施策前後で有意な増加が確認できた。</strong><br>個人差を除去した上での比較なので、対応なしt検定より信頼性が高い結果です。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「差の平均+650歩」は実際のユーザー増加量として解釈できる</strong>：全ユーザーに施策を適用した場合、1人あたり平均650歩の増加が見込めます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">差のSD（2,800歩）から個人差の大きさも伝えられる</strong>：「平均+650歩だが、個人差は±2,800歩と大きい」という補足情報は施策効果の確実性を正直に伝えます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">コントロール群（施策なし）がないと外部要因の影響を除けない</strong>：季節・祝日・他施策が同時進行している場合、差が施策の効果とは限りません。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">差の分布も確認する</strong>：増加したユーザーが多いか（差>0が多いか）を確認することで、「全体平均が上がった理由」が一部ユーザーの大幅増加なのか、全体的な底上げなのかが判断できます。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「全体平均が増加した」という事実の背景を理解することが重要です。増加ユーザーが80%なら全体施策として有効ですが、50%なら「効く人と効かない人がいる」施策で、ターゲットを絞った方が費用対効果が上がります。また効果の持続性を確認しないと、長期継続投資が妥当かどうかを判断できません。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">増加・減少ユーザーの割合を確認</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">3か月後の追跡調査で効果持続性を検証</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">差分の差（DID）分析で外部要因を除去</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">増加ユーザー80%以上</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">施策が幅広いユーザー層に効いている。全体展開の根拠として有力です。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">増加ユーザー50%前後</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">施策が効く層と効かない層が半々。効いた層の特性を分析してターゲットを絞ると費用対効果が上がります。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">3か月後も差が維持されている</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">習慣化が起きている。施策の長期継続・横展開を推奨します。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">3か月後に差が縮小・消失</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ノベルティ効果の可能性。施策を変化させ続けるか、定期的な再介入の仕組みを設計してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">DID分析でも有意差あり</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">外部要因を除いても施策効果が確認できた。因果性の主張が強くなります。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">DID分析で差が消える</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">見かけの効果だった可能性。同時期の外部要因（季節変動・他施策）が原因を分析してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン2  有意差あり・施策後に減少</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">t=-3.2, p=0.002, 前: 8,200歩 → 後: 7,600歩（差-600歩）</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">同一ユーザーの施策後に歩数が有意に減少した。意図しない副作用の可能性。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">施策が逆効果を生んでいる可能性が高い</strong>：有意差があり、かつ方向がマイナスなので「施策がユーザー行動を悪化させた」という仮説を真剣に検討する必要があります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">通知過多・UI変更・機能変更などが原因候補</strong>：施策変更の内容を細分化して、どの変更が減少を引き起こしたかを特定してください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">ただし外部要因（冬季の歩数減少など）の可能性も</strong>：コントロール群がない場合は断言できません。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「どの施策変更が悪影響を与えたか」を特定しないと同じ問題を繰り返します。施策を一時停止して原因を特定し、セグメント別に分析することで「全員に悪影響があったのか、一部だけか」を判断することが再設計のために必要です。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">施策変更内容の再確認と原因調査</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">施策の一時停止を検討</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">通知頻度増加と同時進行</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">通知疲れが原因の可能性。通知頻度を元に戻すか大幅に削減して再テストしてください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">UI変更と同時進行</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">UIの使いにくさが歩数減少につながっている可能性。元のUIに戻したコントロール群での検証を推奨します。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">特定セグメントのみで減少</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">全体ではなく一部セグメントへの悪影響。そのセグメントへの施策適用を除外した設計に変更してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン3  有意差なし</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">p=0.12, 前: 7,150歩 → 後: 7,400歩（差+250歩）</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">施策前後の差は+250歩あるが、有意差とは言えなかった。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「差が250歩しかない」のか「250歩の差を検出できなかった」のかは別問題</strong>：差のSDが大きい（例：SD=3,000歩）場合、250歩の差は検出できません。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">第二種の過誤を疑う</strong>：n=100人では歩数250歩の差（d≈0.09）を検出するのは困難です。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">正しい解釈</strong>：「統計的有意差は認められなかった（t=1.56, p=0.12）。前後の平均差+250歩（95%CI: -70〜+570歩）は、この信頼区間の幅を考慮すると不確定性が大きい。」</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「有意差なし＝効果なし」と判断すると、本当は効果のある施策を諦めてしまう可能性があります。今回のサンプル数で+250歩の差を検出するのに十分だったかを確認することで、「再テストすれば有意差が出る可能性がある」か「本当に効果がない」かを区別できます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">検定力分析</strong>：+250歩を検出するための必要nを算出。</span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">必要n ≒ 実際のn</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">十分なサンプルで差が出なかった。施策に本質的な効果がない可能性が高い。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">必要n >> 実際のn</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">サンプル不足だった。同じ施策で期間を延ばすか対象ユーザーを増やして再テストする価値があります。</div></div></div></div></div></div></div><div class="warn-box"><strong style="color:var(--color-text-primary)">注意：</strong>差の分布が偏っている場合（購入金額など）は Wilcoxon 符号順位検定を使ってください。</div>`,
r_rm_anova:`<h3>どんな場面で使うか</h3><p>同一ユーザーを3時点以上追跡して、指標が時点間で変化したかを検定します。施策の長期効果測定に使います。</p><div class="ex-box"><span class="exl">典型的な使用例</span>・施策前・1か月後・3か月後の3時点でログイン頻度を比較<br>・キャンペーン前・期中・終了後の購入金額を比較</div><div style="background:rgba(0,0,0,0.025);border-radius:8px;padding:12px 14px;margin:4px 0 12px 0"><div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:8px">3時点での指標の変化（帯は信頼区間のイメージ）</div><svg viewBox="0 0 320 110" width="100%" height="110" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"><line x1="40" y1="95" x2="300" y2="95" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><line x1="70" y1="95" x2="70" y2="100" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><text x="70" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">施策前</text><line x1="170" y1="95" x2="170" y2="100" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><text x="170" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">1か月後</text><line x1="260" y1="95" x2="260" y2="100" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><text x="260" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">3か月後</text><path d="M 70 45 L 170 23 L 260 -1 L 260 35 L 170 57 L 70 75 Z" fill="#4B8FD4" opacity="0.12"/><path d="M 70 60 L 170 40 L 260 17" fill="none" stroke="#4B8FD4" stroke-width="2" stroke-linejoin="round"/><circle cx="70" cy="60" r="4" fill="#4B8FD4"/><circle cx="170" cy="40" r="4" fill="#4B8FD4"/><circle cx="260" cy="17" r="4" fill="#4B8FD4"/><text x="305" y="9" text-anchor="end" font-family="sans-serif" font-size="8" fill="#4B8FD4">有意</text></svg></div><h3>データ構成</h3><div style="font-size:11.5px;line-height:1.7;color:var(--color-text-secondary);margin-bottom:8px">検定を実行するために、以下の形式にデータを準備してください。</div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">① 元データの形（縦持ち：1行 = 1ユーザー × 1時点）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">period</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">login_count</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">before</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">12</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">month1</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">15</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">month3</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">18</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">before</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">8</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">同一 user_id が時点数分の行を持ちます。period は before / month1 / month3 などの文字列ラベル。</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">② 検定用に横持ち（wide形式）に変換（加工コード）</div><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:7px 10px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.85;margin:5px 0"># 縦持ち → 横持ちに変換<br>wide = df.pivot(index='user_id', columns='period', values='login_count')<br>wide = wide[['before','month1','month3']].dropna()  # 時点順に並べ、欠損ユーザーを除外</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">③ 検定に渡すデータの形（横持ち）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">login_count_before</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">login_count_month1</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">login_count_month3</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">12</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">15</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">18</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">8</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">10</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">11</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">途中の時点が欠損しているユーザーはそのユーザー全体が除外されます。離脱率が高い場合は結果の解釈に注意してください。</div></div><h3>実行手順</h3><div style="margin-top:4px"><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">1</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">データをワイド形式（各列=1時点）に整形する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">wide = df.pivot(index='user_id', columns='period', values='login_count')<br>wide = wide[['before', 'month1', 'month3']]  # 時点順に並べる<br>print(wide.head())</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">データ形式</div>user_id　before　month1　month3<br>U001　　　　12　　　15　　　18<br>U002　　　　 8　　　10　　　11</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">2</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">反復測定 ANOVA を実行する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">import pingouin as pg  # pip install pingouin<br>long = wide.reset_index().melt(id_vars='user_id', var_name='period', value_name='value')<br>result = pg.rm_anova(data=long, dv='value', within='period', subject='user_id', correction=True)<br>print(result[['Source','F','p-unc','p-GG-corr']])</div><div style="background:var(--color-background-success);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.7;margin:6px 0"><strong style="color:var(--color-text-primary)">結果の読み方</strong><br>p-GG-corr（Greenhouse-Geisser 補正後のp値）&lt; 0.05 → 時点間に有意差あり</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">3</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">多重比較で差がある時点ペアを特定する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">posthoc = pg.pairwise_tests(data=long, dv='value', within='period',<br>                            subject='user_id', padjust='bonf')<br>print(posthoc[['A','B','p-corr']])</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">出力の見方</div>p-corr（Bonferroni補正後p値）&lt; 0.05 → そのペアに有意差あり</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">4</span></div><div style="padding-left:10px;padding-bottom:4px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">結果をまとめる</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">報告例</div>3時点でのログイン頻度に有意差が認められた（反復測定ANOVA、F=18.2、p&lt;0.001）。<br>Bonferroni 補正による多重比較の結果、施策前 vs 3か月後（p&lt;0.001）に有意差が認められた。</div></div></div></div></div><h3>結果の読み方・解釈パターン</h3><div style="margin-top:4px"><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン1  右肩上がりのトレンドが有意</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">F=18.2, p<0.001, 全時点ペアに有意差あり</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">3時点間すべてで有意な増加が確認できた。施策の即効性と持続性の両方が確認できている状態。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「施策の効果が時間とともに蓄積する」という示唆が得られる</strong>：1か月後より3か月後の方が差が大きければ、施策を続けるほど効果が高まるという仮説が立てられます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">施策継続コストvs累積効果の比較ができる</strong>：各時点での効果増加量を金額換算し、施策の月次コストと比較してください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">球面性の仮定（Mauchly検定）の確認が必要</strong>：違反していた場合はGreenhouse-Geisser補正後のp値（p-GG-corr）を使ってください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「全時点間に有意差がある」は慎重に確認を</strong>：ANOVA有意→多重比較→一部のペアのみ有意、というケースも多いです。多重比較の結果を必ず確認してください。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">施策の継続投資を判断するためには、「効果の伸びが今後も続くのか（天井効果がないか）」を確認することが必要です。また長期追跡をしないと「3か月後まで効果があった」という事実しか分からず、「6か月後も続くのか」が不明なままになります。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">各時点の変化量をグラフ化で天井効果の有無を確認</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><s
