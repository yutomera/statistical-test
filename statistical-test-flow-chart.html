:var(--color-text-primary);line-height:1.85;margin:5px 0">group_a = df[df['campaign']=='A']['point_spend'].dropna()<br>group_b = df[df['campaign']=='B']['point_spend'].dropna()</div></div><h3>実行手順</h3><div style="margin-top:4px"><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">1</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">データを2グループに分ける</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">group_a = df[df['campaign']=='A']['point_spend']<br>group_b = df[df['campaign']=='B']['point_spend']</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">基本統計量の確認（中央値・四分位範囲で確認）</div>print(group_a.median(), group_a.quantile([0.25, 0.75]))<br>print(group_b.median(), group_b.quantile([0.25, 0.75]))</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">2</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">Mann-Whitney U 検定を実行する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">from scipy import stats<br>stat, p_value = stats.mannwhitneyu(group_a, group_b, alternative='two-sided')<br>print('U統計量:', round(stat), 'p値:', round(p_value,4))</div><div style="background:var(--color-background-success);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.7;margin:6px 0"><strong style="color:var(--color-text-primary)">結果の読み方</strong><br>p値 &lt; 0.05 → 2群間の中央値に有意差あり<br>p値 ≥ 0.05 → 差があるとは言えない</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">3</span></div><div style="padding-left:10px;padding-bottom:4px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">結果をまとめる</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">報告例</div>A施策群（n=500）のポイント消費額の中央値は 2,800円（IQR: 1,200–5,400）、B施策群（n=480）は 2,100円（IQR: 900–4,200）であり、両群間に有意差が認められた（Mann-Whitney U 検定、p=0.032）。</div><div style="font-size:11px;color:var(--color-text-danger);margin-top:6px">⚠ 平均±SD ではなく <strong style="color:var(--color-text-primary)">中央値（IQR）</strong>で報告することが必須です。</div></div></div></div></div><h3>結果の読み方・解釈パターン</h3><div style="margin-top:4px"><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン1  有意差あり・中央値の差が明確</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">p=0.032, A群中央値2,800円(IQR:1,200-5,400) vs B群2,100円(IQR:900-4,200)</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">2群の中央値に統計的に有意な差があると確認できた。</strong><br>外れ値（ヘビーユーザー）の影響を除いた比較なので、「一般的なユーザーレベルでの差」として解釈できます。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">中央値ベースの差は実態に即した施策根拠になる</strong>：「典型的なユーザーでA施策の方が700円多くポイントを消費する」という示唆が得られます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">IQRも読み取れる情報がある</strong>：A群のIQR（1,200〜5,400）はB群（900〜4,200）より広い。A群のユーザー間ばらつきが大きいことが読み取れます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">平均値も確認すること</strong>：中央値は近くても平均値が大きく異なる場合、一部のヘビーユーザーが施策に大きく反応している可能性があります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">正しい報告</strong>：「Mann-Whitney U検定、U=XXX、p=0.032。A群中央値2,800円（IQR:1,200-5,400）はB群2,100円（IQR:900-4,200）より有意に高かった。」</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">有意差の「大きさ」を確認しないと、施策コストと見合わない小さな差に投資する可能性があります。また施策効果が全ユーザーに広がっているのか、一部のヘビーユーザーだけが反応したのかを区別することで、本番展開の対象をどう設定すべきかが明確になります。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">rank-biserial correlation（rbc）で効果量算出</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">ヘビーユーザー除外後でも差があるか確認</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">rbc ≥ 0.3（中〜大）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">施策効果は実務的にも十分な大きさ。本番展開の根拠として使えます。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">rbc < 0.3（小）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">差は有意でも小さい。一部のヘビーユーザーのみが反応した可能性があります。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">ヘビーユーザー除外後も差がある</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">一般ユーザー全体に施策効果が広がっている。本番展開の強い根拠になります。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">ヘビーユーザー除外後に差が消える</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">少数のヘビーユーザーだけが反応した施策。ヘビーユーザー向けに絞り込んだ設計に変更することを検討してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン2  中央値は近いがIQRが大きく違う</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">p=0.04, A群中央値2,800円(IQR:1,200-5,400) vs B群2,750円(IQR:600-8,200)</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">中央値は近いが、B群のIQRが大幅に広い。「典型ユーザー」は同じでも分布の形が大きく違う。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">B群では高額消費ユーザーと低額消費ユーザーへの二極化が進んでいる可能性</strong>：IQR上限（8,200円）がA群（5,400円）より大幅に高い。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">中央値だけで比較すると施策の影響を見誤る</strong>：「差がわずか50円」という中央値だけの比較では、分布形状の変化（二極化）が見えません。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">IQRは分布の「広がり」を示す</strong>：Q3-Q1の値が大きいほど、ユーザー間のばらつきが大きい。B群施策はユーザーを均質化せず二極化させた可能性があります。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">中央値の数値だけでは「B群で一部のユーザーが大きく反応した」という重要な変化を見逃す可能性があります。誰がどれだけ反応したかを把握することで、施策の恩恵を受けているセグメントを特定し、そこへの集中施策設計ができます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">分位点回帰（Quantile Regression）</strong>：中央値だけでなく上位/下位25%でも比較してください。</span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">B群の高額消費ユーザーの属性分析</strong>：効果が集中しているセグメントを特定してください。</span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">高額消費ユーザーが特定セグメントに集中</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">施策がそのセグメントに効いている。そのセグメントへの絞り込み施策に再設計することで効果が高まります。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">低額消費ユーザーが増えている</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">施策によって消費を減らしたユーザーも生まれている。施策の副作用を確認してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン3  有意差なし</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">p=0.18, A群中央値2,800円 vs B群2,700円</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">2群の中央値に統計的に有意な差は認められなかった。</strong><br>「100円の差が存在しない」ではなく「100円の差を統計的に主張できるほどの根拠が得られなかった」という意味です。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">100円差は本当に小さいのか？</strong>：ユーザー数×100円で総額を計算すると、施策規模によっては実務的に意味のある差かもしれません。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">サンプル数・IQRによっては検出力不足の可能性</strong>：分布のばらつきが大きいノンパラメトリックデータは差を検出しにくいです。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">IQRの重なりを確認する</strong>：A群IQR（1,200-5,400）とB群IQR（900-4,200）が大きく重なっている場合、元々差が出にくいデータです。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「有意差なし＝施策に効果なし」ではありません。今回のサンプル数で「中央値差500円」を検出できる確率（検定力）を確認しないと、本来は効果のある施策を諦めてしまう可能性があります。検定力が低い場合はサンプル増加・施策強化のどちらが有効かを判断できます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">検定力分析</strong>：中央値差+500円を検出できる確率（検定力）を計算してください。</span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">施策の変更・強化</strong>：効果量が小さすぎる可能性があります。</span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">検定力 < 0.8 かつ 差+100円程度</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">サンプル不足と効果の小ささが重なっている。施策強度を上げて再テストしてください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">検定力 ≥ 0.8 かつ 差なし</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">十分なサンプルで差が出なかった。施策に本質的な効果がない可能性が高い。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">検定力 < 0.8 かつ 差 ≥ +500円</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">施策効果は出ているがサンプル不足。同じ施策でサンプルを増やして再テストする価値があります。</div></div></div></div></div></div></div>`,
r_kruskal:`<h3>どんな場面で使うか</h3><p>対応のない3グループ以上を比較する際、データが偏っている場合に使います。一元配置 ANOVA のノンパラメトリック版です。</p><div class="ex-box"><span class="exl">典型的な使用例</span>・ブロンズ / シルバー / ゴールド会員の月間購入金額（中央値）<br>・施策パターン A / B / C のポイント消費額<br>・登録経路（オーガニック / SNS広告 / 紹介）別の継続期間</div><div style="background:rgba(0,0,0,0.025);border-radius:8px;padding:12px 14px;margin:4px 0 12px 0"><div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:8px">3グループのボックスプロット（分布の比較）</div><svg viewBox="0 0 320 110" width="100%" height="110" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"><line x1="20" y1="95" x2="310" y2="95" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><rect x="50" y="40" width="40" height="30" fill="#4B8FD4" opacity="0.3" stroke="#4B8FD4" stroke-width="1.2" rx="2"/><line x1="50" y1="57" x2="90" y2="57" stroke="#4B8FD4" stroke-width="2"/><line x1="70" y1="40" x2="70" y2="25" stroke="#4B8FD4" stroke-width="1" stroke-dasharray="2,2"/><text x="70" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">ブロンズ</text><rect x="130" y="47" width="40" height="30" fill="#D4843A" opacity="0.3" stroke="#D4843A" stroke-width="1.2" rx="2"/><line x1="130" y1="65" x2="170" y2="65" stroke="#D4843A" stroke-width="2"/><line x1="150" y1="47" x2="150" y2="15" stroke="#D4843A" stroke-width="1" stroke-dasharray="2,2"/><text x="150" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">シルバー</text><rect x="210" y="59" width="40" height="24" fill="#2B9B78" opacity="0.3" stroke="#2B9B78" stroke-width="1.2" rx="2"/><line x1="210" y1="71" x2="250" y2="71" stroke="#2B9B78" stroke-width="2"/><line x1="230" y1="59" x2="230" y2="0" stroke="#2B9B78" stroke-width="1" stroke-dasharray="2,2"/><text x="230" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">ゴールド</text></svg></div><h3>データ構成</h3><div style="font-size:11.5px;line-height:1.7;color:var(--color-text-secondary);margin-bottom:8px">検定を実行するために、以下の形式にデータを準備してください。</div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">① 元データの形（1行 = 1ユーザー）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">rank</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">purchase_amt</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">bronze</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">3,200</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">silver</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">6,800</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U003</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">gold</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">14,500</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U004</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">bronze</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">2,900</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">rank 列に3値以上のグループラベル、指標列（purchase_amt）を用意します。</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">② 検定用に群ごとの Series に分割（加工コード）</div><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:7px 10px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.85;margin:5px 0">bronze = df[df['rank']=='bronze']['purchase_amt'].dropna()<br>silver = df[df['rank']=='silver']['purchase_amt'].dropna()<br>gold   = df[df['rank']=='gold']['purchase_amt'].dropna()</div></div><h3>実行手順</h3><div style="margin-top:4px"><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">1</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">各群のデータを用意する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">bronze = df[df['rank']=='bronze']['purchase_amt']<br>silver = df[df['rank']=='silver']['purchase_amt']<br>gold   = df[df['rank']=='gold']['purchase_amt']</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">確認</div>各群の中央値・IQRをまず確認しておきましょう。</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">2</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">Kruskal-Wallis 検定を実行する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">from scipy import stats<br>stat, p_value = stats.kruskal(bronze, silver, gold)<br>print('H統計量:', round(stat,3), 'p値:', round(p_value,4))</div><div style="background:var(--color-background-success);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.7;margin:6px 0"><strong style="color:var(--color-text-primary)">結果の読み方</strong><br>p値 &lt; 0.05 → 少なくとも1群間に差あり → 多重比較へ<br>p値 ≥ 0.05 → 差があるとは言えない → ここで終了</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">3</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">多重比較（Dunn 法）を実行する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">import scikit_posthocs as sp  # pip install scikit-posthocs<br>import pandas as pd<br>data = pd.concat([bronze.rename('bronze'), silver.rename('silver'), gold.rename('gold')])<br>grp  = (['bronze']*len(bronze) + ['silver']*len(silver) + ['gold']*len(gold))<br>df2  = pd.DataFrame({"value": data.values, "group": grp})<br>result = sp.posthoc_dunn(df2, val_col='value', group_col='group', p_adjust='bonferroni')<br>print(result)</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">出力の見方</div>群ペアのp値が表形式で表示されます。p &lt; 0.05 → その組み合わせに有意差あり</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">4</span></div><div style="padding-left:10px;padding-bottom:4px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">結果をまとめる</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">報告例</div>会員ランク3群間で月間購入金額に有意差が認められた（Kruskal-Wallis 検定、H=24.3、p&lt;0.001）。Dunn 法（Bonferroni 補正）による多重比較の結果、ゴールド会員は他の2群と比較して有意に高い購入金額を示した（p&lt;0.01）。<br>中央値（IQR）：ブロンズ 3,200（1,800–6,100）、シルバー 5,800（3,200–9,400）、ゴールド 12,400（7,200–18,600）円</div></div></div></div></div><h3>結果の読み方・解釈パターン</h3><div style="margin-top:4px"><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン1  全群に段階的な差あり</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">H=24.3, p<0.001, Dunn法: 全ペアに有意差</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">3グループ間すべての中央値に有意な差があると確認できた状態。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">グループ別の中央値（IQR）を並べると施策の説明資料になる</strong>：「ブロンズ3,200円（1,800-6,100）、シルバー5,800円（3,200-9,400）、ゴールド12,400円（7,200-18,600）」という形でランク別の購買力が具体的に示せます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">ランクアップ施策の優先順位を数値で示せる</strong>：ゴールドとシルバーの中央値差（6,600円）とシルバーとブロンズの差（2,600円）を比べて、どちらへの引き上げに投資すべきかが判断できます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">同順位（タイ）が多いと補正が必要</strong>：ポイント消費が0円のユーザーが多い場合、タイ補正を行っているか確認してください（多くのライブラリでは自動補正済み）。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「どのランク間の差が最も大きいか」を定量化することで、施策投資の優先順位を数値根拠で決定できます。効果量の確認はランクアップ施策のROI試算に直結します。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">Epsilon-squaredで効果量算出</strong>：es = H/(n-1)。0.04以上で中程度。</span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">中央値差が最大のランク間を施策優先順位に反映。</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">es ≥ 0.14（大）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ランクが購入金額に大きく影響している。ランクアップ促進施策の優先度を高めることを推奨します。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">es = 0.04〜0.14（中）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ランク以外の要因も同程度に影響している可能性。多変量分析も合わせて検討してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">ゴールド中央値が他の2〜3倍</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ゴールド引き上げ施策が最大のLTV向上手段になりえます。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン2  検定有意・一部のペアのみ差あり</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">H=10.8, p=0.008, Dunn法: ゴールド vs 他のみ有意</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">Kruskal-Wallisは有意だが、差はゴールドと他2群の間にのみ存在する。</strong><br>ブロンズ-シルバー間には統計的に有意な差は見られなかった。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">ゴールド向け施策には明確な根拠がある</strong>：ゴールド会員の購入金額中央値が他の2群と有意に異なることが確認されています。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">ブロンズ-シルバー間の施策差別化には根拠が薄い</strong>：この2群は購入金額の分布が統計的に区別できないレベルで近い状態です。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「ゴールド以上か否か」の二分類が有効かもしれない</strong>：ゴールドと非ゴールドで2群に再分類してMann-Whitney U検定で比較してみてください。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">ゴールドのみに差が集中している原因を特定することで、「他のランクのユーザーをゴールドに近づける施策」の設計ができます。また、ブロンズとシルバーの差別化施策に投資する前に「本当に差があるか」を確認することで、無駄な施策コストを防げます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">ブロンズ-シルバー間の行動ログ分析</strong>：差が出ない原因を特定するため両ランクの行動を比較してください。</span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">ゴールド会員の行動をベースにした施策設計</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">ブロンズ-シルバー間で行動ログも差がない</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">両ランクでほぼ同じ行動をしている。現行のランク制度がブロンズ-シルバー間の差別化を生み出せていません。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">ゴールド特有の行動パターンが判明</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">その行動を他ランクへ促す行動変容施策を設計できます。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン3  有意差なし</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">H=3.8, p=0.15</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">3群間で購入金額の分布に有意差は見られなかった。多重比較は実施しません。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">ランク制度が購買差別化につながっていない可能性</strong>：どのランクのユーザーも同じ水準で購入している状態です。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">群間のサンプル数が大きく異なる場合は検出力不足の可能性</strong>：ゴールド会員が100人未満などの場合は、検定力が低く差を見逃している可能性があります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">中央値と四分位範囲を表にまとめると実態が見える</strong>：有意差なしでも、各群の中央値・IQRを示すことで「ゴールドの中央値はブロンズより2,000円高いが有意差はなかった」という報告ができます。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">有意差なしの原因が「サンプル不足」か「本当に差がない」かで、次のアクションが全く変わります。また「ランク以外の軸」で差が出るなら、現行のランク制度の設計自体に問題があるというシグナルになります。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">ランク制度の効果検証</strong>：特典の魅力・ランクアップ条件・体験差の見直しを検討。</span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">別軸での再分析</strong>：継続期間・ログイン頻度などで再グループ分け。</span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">別軸で有意差が出る</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ランクより「行動の深さ」が購入金額を説明できる。エンゲージメント指標をベースにしたセグメント設計の方が施策効果が高い可能性があります。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">どの軸でも差が出ない</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ユーザーの購買行動が均質。ランク制度によるセグメント施策の効果は期待しにくい。</div></div></div></div></div></div></div>`,
r_chi2:`<h3>どんな場面で使うか</h3><p>2グループ以上で、カテゴリ変数（購入あり/なし、参加あり/なし）の比率に差があるかを検定します。A/Bテストのコンバージョン率比較が典型的な使用例です。</p><div class="ex-box"><span class="exl">典型的な使用例</span>・施策A群 vs B群のキャンペーン参加率<br>・通知ON vs OFFのポイント利用率<br>・会員ランク別のアプリ継続率</div><div style="background:rgba(0,0,0,0.025);border-radius:8px;padding:12px 14px;margin:4px 0 12px 0"><div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:8px">コンバージョン率の比較（A群 vs B群）</div><svg viewBox="0 0 320 110" width="100%" height="110" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"><line x1="30" y1="95" x2="310" y2="95" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><rect x="57" y="31" width="35" height="64" fill="#2B9B78" opacity="0.7" rx="2"/><rect x="98" y="69.8" width="35" height="25.2" fill="#8A8A8A" opacity="0.4" rx="2"/><text x="75" y="28" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2B9B78">32%</text><text x="95" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">A群</text><rect x="177" y="43" width="35" height="52" fill="#2B9B78" opacity="0.7" rx="2"/><rect x="218" y="61.4" width="35" height="33.6" fill="#8A8A8A" opacity="0.4" rx="2"/><text x="195" y="40" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2B9B78">26%</text><text x="215" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">B群</text><rect x="25" y="12" width="10" height="8" fill="#2B9B78" opacity="0.7" rx="1"/><text x="38" y="20" text-anchor="start" font-family="sans-serif" font-size="8" fill="#8A8A8A">購入あり</text><rect x="95" y="12" width="10" height="8" fill="#8A8A8A" opacity="0.4" rx="1"/><text x="108" y="20" text-anchor="start" font-family="sans-serif" font-size="8" fill="#8A8A8A">購入なし</text></svg></div><h3>データ構成</h3><div style="font-size:11.5px;line-height:1.7;color:var(--color-text-secondary);margin-bottom:8px">検定を実行するために、以下の形式にデータを準備してください。</div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">① 元データの形（1行 = 1ユーザー）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">group</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">purchased</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">A</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">A</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U003</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">B</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U004</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">B</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">purchased は 0（なし）/ 1（あり）の2値変数。group 列でA/Bを区別します。</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">② クロス集計表（分割表）に変換（加工コード）</div><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:7px 10px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.85;margin:5px 0">import pandas as pd<br>ct = pd.crosstab(df['group'], df['purchased'])<br># → 行=group（A/B）、列=purchased（0/1）の2×2テーブルになります</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">③ 検定に渡すデータの形（分割表）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left"></th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">0（なし）</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">1（あり）</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">A群</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">680</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">320</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">B群</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">740</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">260</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">全セルの期待度数が5以上か確認してください（fisher_exact の場合は不要）。</div></div><h3>実行手順</h3><div style="margin-top:4px"><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">1</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">分割表（クロス集計表）を作る</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">import pandas as pd<br>ct = pd.crosstab(df['group'], df['purchased'])<br>print(ct)</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">出力イメージ</div>purchased　　0（なし）　1（あり）<br>group<br>A　　　　　　　680　　　 320<br>B　　　　　　　740　　　 260</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">2</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">期待度数を確認する（必須）</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">from scipy.stats import chi2_contingency<br>_, _, _, expected = chi2_contingency(ct)<br>print('期待度数:')<br>print(expected.round(1))</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">確認ポイント</div>全セルの値が 5 以上であることを確認してください。<br>5未満のセルがある場合 → Fisher 正確検定に切り替え</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">3</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">カイ二乗検定を実行する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">chi2, p_value, dof, expected = chi2_contingency(ct)<br>print('χ²=', round(chi2,3), 'p値=', round(p_value,4), '自由度=', dof)</div><div style="background:var(--color-background-success);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.7;margin:6px 0"><strong style="color:var(--color-text-primary)">結果の読み方</strong><br>p値 &lt; 0.05 → 2群間の購入率に有意差あり<br>p値 ≥ 0.05 → 差があるとは言えない</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">4</span></div><div style="padding-left:10px;padding-bottom:4px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">結果をまとめる</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">報告例</div>A施策群の購入率は 32.0%（320/1000）、B施策群は 26.0%（260/1000）であり、両群間に統計的に有意な差が認められた（χ²=8.65、df=1、p=0.003）。</div></div></div></div></div><h3>結果の読み方・解釈パターン</h3><div style="margin-top:4px"><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン1  有意差あり・施策Aが優位</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">χ²=8.65, df=1, p=0.003, A群32% vs B群26%</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">A群のコンバージョン率がB群より統計的に有意に高いことが確認できた。</strong><br>差は+6ポイント（絶対差）、相対的には+23%の向上です。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">リフトとオッズ比で効果の大きさを語れる</strong>：A群の購入オッズはB群の1.34倍（=(32/68)/(26/74)）。「施策Aで購入する確率が34%高くなる」と言えます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">サンプル数×コンバージョン率差で収益インパクトを試算できる</strong>：1,000人に施策Aを適用するなら、B群と比べて60人多く購入する見込み。60人×平均客単価=推定収益増加額として計算できます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「32% vs 26%」の差は十分大きいか？</strong>：業種や施策コストによります。CPAを計算して採算が取れるか確認してください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">正しい報告</strong>：「χ²(1)=8.65、p=0.003、A群32.0%、B群26.0%、オッズ比=1.34（95%CI: 1.10-1.63）」</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「有意差あり」だけでは施策採用の判断に不十分です。差の大きさ（実務的重要性）・費用対効果（ROI）・どのセグメントに効いているか、の3点を確認することで「採用すべき施策か」「どこに展開すべきか」が初めて判断できます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">Cramér's V で効果量算出</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">セグメント別の再集計</strong>：ランク・年齢層別にも差があるか確認。</span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">費用対効果の試算</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">V ≥ 0.3（中〜大）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">施策効果は実務的にも十分な大きさ。本番展開を推奨します。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">V = 0.1〜0.3（小）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">効果は小さい。施策コストと照らし合わせてROIがプラスか確認してから判断してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">V < 0.1（ごく小）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">有意差はあるが実務上ほぼ無意味。現状維持か施策の抜本的な見直しを推奨します。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">ROI がプラス</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">統計的有意 + 経済的有意の両方が確認できた。本番展開の意思決定を進めてください。<br><span style="font-size:10.5px;color:var(--color-text-tertiary)">ROI計算式：（コンバージョン増加数 × 平均客単価 × 継続月数）÷ 施策コスト</span></div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">ROI がマイナス</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">統計的には有意でもビジネス的にはペイしない。施策コストの削減または別施策の検討が必要です。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">セグメント別で効果が逆転</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">Simpson's Paradox の可能性。全体と特定セグメントで結果が逆のため、セグメント別施策として再設計が必要です。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン2  有意差あり・差がごく小さい</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">χ²=4.1, p=0.04, A群5.02% vs B群4.98%</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">統計的には有意でも、差が0.04ポイントと実務上ほぼ意味がない状態。</strong><br>n=50,000以上のような大規模A/Bテストではこういった結果が多発します。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「有意差あり」だけで施策採用を判断してはいけない典型例</strong>：0.04%の差は計測ノイズとほぼ区別がつかず、施策の効果とは言えません。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">大規模テストほど「実務的に無意味な差」が有意になりやすい</strong>：n=100万では0.01%の差でも有意になります。検定の感度が高すぎる状態です。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">事前にMDEを設定すべきだった</strong>：「コンバージョン率+0.5%以上を施策採用の基準」と事前に決めておくことで、このような状況を防げます。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">効果量を確認しないと、大規模A/Bテストで「有意差あり」という報告を受けた意思決定者が誤って施策を採用してしまいます。次回テスト設計にも活かすため、「何%の差なら採用する」という基準（MDE）を事前設定することが重要です。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">Cramér's V を必ず計算</strong>：V &lt; 0.1 はほぼ無意味な差とみなされます。</span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">事前のMDE設計の見直し</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">d < 0.2</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">有意差はあるが実務上無意味な差。施策変更の根拠にはなりません。次回テストではMDEを先に設定して設計してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">MDEを下回っている</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">検出できても意味がない差。A/Bテストの設計段階に立ち返り、必要なサンプル数と検出したい差の大きさを再設定してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン3  有意差なし</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">χ²=1.4, p=0.24, A群32% vs B群30%</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">2群間のコンバージョン率に有意差は認められなかった。</strong><br>2%差が「ない」のではなく「統計的に主張できるほどの根拠が得られなかった」という意味です。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">2%差を検出するには数千〜数万人のサンプルが必要</strong>：コンバージョン率30%前後で2%差を検出するには両群合計で約6,000人必要です（α=0.05、検定力80%）。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">期間が短すぎた可能性もある</strong>：週次変動・季節変動の影響を均すためには、少なくとも1〜2週間のテスト期間が推奨されます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">正しい報告</strong>：「χ²(1)=1.4、p=0.24。A群32.0%、B群30.0%の間に統計的有意差は認められなかった。」</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「有意差なし＝施策効果なし」という誤った結論を防ぐため、今回のサンプル数で「2%差」を検出するのに十分だったかを確認することが必要です。不十分だった場合は、同じ施策を大きなサンプルで再テストすれば有意差が出る可能性があります。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">必要サンプル数の事後計算</strong>：2%差を検出するのに必要なnを算出。</span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">テスト期間の延長または施策の強化</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-te
