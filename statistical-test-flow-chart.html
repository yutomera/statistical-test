pan style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">6か月後・1年後の追跡調査を計画</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">変化の傾きが鈍化している</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">天井効果が近い可能性。施策の強度を上げるか、次のフェーズの施策を準備してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">変化の傾きが一定（線形増加）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">まだ天井がなく効果が持続中。施策の継続と横展開を推奨します。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">6か月後も差が維持</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">長期的な習慣化が達成されている。施策の本番化・他セグメントへの展開のタイミングです。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン2  施策直後のみ効果・後半に後退</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">p=0.004, 施策前→1か月後は有意（p=0.001）、1か月後→3か月後は非有意（p=0.82）</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">施策直後は効果があったが、その後は横ばいに戻った状態。ノベルティ効果の可能性。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">1か月後に最大効果を発揮し、その後は維持されているだけで成長が止まった可能性</strong>：継続的な新しい刺激がなければ効果が頭打ちになる施策設計かもしれません。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">完全に元に戻っている場合は施策の持続効果がゼロということ</strong>：「1か月後の増加分が3か月後には消えた」という状況は、行動変容ではなく一時的な行動誘導に留まっています。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「施策前→3か月後」に有意差があるかを確認</strong>：全体として施策前よりは高い水準にあるなら「効果は出ているが成長が止まった」という解釈になります。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">後退しているユーザーの属性を分析することで「誰にとって効果が続かないのか」が分かり、リテンション施策のターゲットを絞れます。後退の原因を特定しないと同じ施策を繰り返しても同じパターンを繰り返すだけです。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">リテンション施策の追加設計</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">後退ユーザーの属性分析</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">後退ユーザーが低エンゲージ層</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">もともと施策への親和性が低いユーザーが離脱した可能性。コアユーザーへの施策集中を検討してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">後退ユーザーが全層に分散</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">施策設計そのものに持続性がない。継続動機の仕組みを再設計してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">リテンション施策追加後に回復</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">二段階設計（初回施策＋リテンション施策）が有効と確認できた。この設計をテンプレート化してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン3  有意差なし</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">F=1.9, p=0.18</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">3時点間でログイン頻度に有意な変化は見られなかった。多重比較は実施しません。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">値の変化量は確認すること</strong>：有意差なしでも「施策前10回→1か月後11回→3か月後12回」という上昇トレンドがあれば、次のテストに向けて施策を継続する価値があるかもしれません。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">途中離脱ユーザーの除外による影響</strong>：反復測定ANOVAは全時点データが揃ったユーザーのみを使用します。離脱率が高い場合は残ったユーザーが「効果が出にくいユーザー」に偏っている可能性があります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">施策の変更・強化が必要なサインかもしれない</strong>：3時点追跡してもトレンドが見えない施策は根本的な効果がない可能性があります。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">3時点追跡してもトレンドが見えない場合、「測定期間が不十分か」「施策自体に効果がないか」の切り分けが必要です。また評価指標（ログイン頻度）以外で効果が出ている指標がないかを確認することで、施策の「何が機能して何が機能していないか」が判断できます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">検定力の確認と観察期間の延長</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">Friedman検定で分布形状も確認</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">別の指標（購入回数など）では有意差あり</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ログイン頻度以外に施策効果が出ている指標がある可能性。施策の評価指標を見直してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">どの指標でも有意差なし</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">施策に本質的な効果がない可能性が高い。施策の内容・対象・タイミングを根本から見直してください。</div></div></div></div></div></div></div><div class="warn-box"><strong style="color:var(--color-text-primary)">注意：</strong>途中離脱ユーザーは除外されます。離脱率が高い場合は混合効果モデルの使用を検討してください。</div>`,
r_wilcoxon:`<h3>どんな場面で使うか</h3><p>同一ユーザーの2時点データを比較する際、データが偏っている場合（ポイント消費額・購入金額など）に使います。対応のある t 検定のノンパラメトリック版です。</p><div class="ex-box"><span class="exl">典型的な使用例</span>・施策前後の月間ポイント消費額（中央値）の変化<br>・新UI前後の購入金額（中央値）の変化<br>・クーポン配布前後のセッション時間の変化</div><div style="background:rgba(0,0,0,0.025);border-radius:8px;padding:12px 14px;margin:4px 0 12px 0"><div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:8px">前後比較（外れ値ユーザーがいても中央値で比較）</div><svg viewBox="0 0 320 100" width="100%" height="100" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"><line x1="50" y1="90" x2="290" y2="90" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><text x="80" y="99" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#8A8A8A">施策前</text><text x="220" y="99" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#8A8A8A">施策後</text><line x1="80" y1="73" x2="220" y2="69" stroke="#D4843A" stroke-width="0.8" opacity="0.55"/><circle cx="80" cy="73" r="3" fill="#D4843A"/><circle cx="220" cy="69" r="3" fill="#D4843A"/><line x1="80" y1="80" x2="220" y2="80" stroke="#D4843A" stroke-width="0.8" opacity="0.55"/><circle cx="80" cy="80" r="3" fill="#D4843A"/><circle cx="220" cy="80" r="3" fill="#D4843A"/><line x1="80" y1="52" x2="220" y2="39" stroke="#D4843A" stroke-width="0.8" opacity="0.55"/><circle cx="80" cy="52" r="3" fill="#D4843A"/><circle cx="220" cy="39" r="3" fill="#D4843A"/><line x1="80" y1="83" x2="220" y2="85" stroke="#D45B5B" stroke-width="0.8" opacity="0.55"/><circle cx="80" cy="83" r="3" fill="#D45B5B"/><circle cx="220" cy="85" r="3" fill="#D45B5B"/><line x1="80" y1="64" x2="220" y2="58" stroke="#D4843A" stroke-width="0.8" opacity="0.55"/><circle cx="80" cy="64" r="3" fill="#D4843A"/><circle cx="220" cy="58" r="3" fill="#D4843A"/><line x1="80" y1="75" x2="220" y2="74" stroke="#D4843A" stroke-width="0.8" opacity="0.55"/><circle cx="80" cy="75" r="3" fill="#D4843A"/><circle cx="220" cy="74" r="3" fill="#D4843A"/><line x1="80" y1="43" x2="220" y2="30" stroke="#D4843A" stroke-width="0.8" opacity="0.55"/><circle cx="80" cy="43" r="3" fill="#D4843A"/><circle cx="220" cy="30" r="3" fill="#D4843A"/><line x1="80" y1="82" x2="220" y2="83" stroke="#D45B5B" stroke-width="0.8" opacity="0.55"/><circle cx="80" cy="82" r="3" fill="#D45B5B"/><circle cx="220" cy="83" r="3" fill="#D45B5B"/><text x="150" y="8" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">← 中央値ベースなので外れ値に左右されにくい</text></svg></div><h3>データ構成</h3><div style="font-size:11.5px;line-height:1.7;color:var(--color-text-secondary);margin-bottom:8px">検定を実行するために、以下の形式にデータを準備してください。</div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">① 元データの形（縦持ち：1行 = 1ユーザー × 1時点）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">period</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">point_spend</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">before</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1,800</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">after</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">3,200</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">before</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">8,200</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">after</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">9,100</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">同一 user_id が before と after の2行ずつ存在する形式。BQやDWHでよく見られます。</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">② 検定用に横持ちに変換（加工コード）</div><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:7px 10px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.85;margin:5px 0"># 縦持ち → 横持ちに変換<br>wide = df.pivot(index='user_id', columns='period', values='point_spend')<br>before = wide['before'].dropna()<br>after  = wide['after'].dropna()<br># 両方揃っているユーザーのみ使用（自動的に共通のユーザーになります）</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">③ 検定に渡すデータの形（横持ち）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">point_spend_before</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">point_spend_after</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1,800</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">3,200</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">8,200</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">9,100</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">同一 user_id の before / after がセットになっている必要があります。</div></div><h3>実行手順</h3><div style="margin-top:4px"><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">1</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">ユーザーIDで前後データを紐付ける</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">before = df[df['period']=='before'].set_index('user_id')['point_spend']<br>after  = df[df['period']=='after'].set_index('user_id')['point_spend']<br>common = before.index.intersection(after.index)<br>before, after = before[common], after[common]<br>diff = after - before<br>print('差の中央値:', round(diff.median()), '差の平均:', round(diff.mean()))</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">確認ポイント</div>差の平均が中央値の1.5倍以上離れていれば偏りあり → Wilcoxon が適切</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">2</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">Wilcoxon 符号順位検定を実行する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">from scipy import stats<br>stat, p_value = stats.wilcoxon(before, after, alternative='two-sided')<br>print('W統計量:', round(stat), 'p値:', round(p_value,4))</div><div style="background:var(--color-background-success);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.7;margin:6px 0"><strong style="color:var(--color-text-primary)">結果の読み方</strong><br>p値 &lt; 0.05 → 施策前後で中央値に有意な変化あり<br>p値 ≥ 0.05 → 有意な変化があるとは言えない</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">3</span></div><div style="padding-left:10px;padding-bottom:4px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">結果をまとめる</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">報告例</div>クーポン配布前後で同一ユーザー（n=300）の月間ポイント消費額を比較した結果、前 2,100円（IQR: 800–4,500）→ 後 2,900円（IQR: 1,200–6,800）へ有意に増加した（Wilcoxon 符号順位検定、p=0.008）。</div><div style="font-size:11px;color:var(--color-text-danger);margin-top:6px">⚠ 平均±SD ではなく <strong style="color:var(--color-text-primary)">中央値（IQR）</strong>で報告することが必須です。</div></div></div></div></div><h3>結果の読み方・解釈パターン</h3><div style="margin-top:4px"><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン1  有意差あり・中央値増加</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">W=XXX, p=0.008, 前: 2,100円(IQR:800-4,500) → 後: 2,900円(IQR:1,200-6,800)</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">同一ユーザーの前後で中央値が有意に増加した。外れ値の影響を除いた実態に即した結果。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「典型的なユーザーで+800円の消費増加」という示唆が得られる</strong>：中央値ベースなので、一部の大口ユーザーの変化ではなく「大多数のユーザー」での変化として解釈できます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">IQRが広がった（800-4,500 → 1,200-6,800）ことも重要</strong>：高額消費ユーザー（上位25%）が4,500円から6,800円に増加。施策が上位ユーザーの消費も押し上げた可能性があります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">平均値も確認する</strong>：平均値が中央値より大幅に大きく増加していれば、少数のヘビーユーザーが強く反応した施策ということです。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">正しい報告</strong>：「Wilcoxon符号順位検定（p=0.008）。前後の中央値: 2,100円（IQR:800-4,500）→2,900円（IQR:1,200-6,800）。中央値が有意に増加した。」</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">施策効果が「全体的な底上げ」なのか「一部ユーザーへの集中」なのかを区別することで、次の施策設計が変わります。また効果が3か月後も持続しているかを確認しないと、短期的な施策コストが長期的なLTV向上につながっているかどうかを判断できません。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">分位点別の変化量を確認（下位25%・中央値・上位25%）</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">3か月後も差が持続しているかFriedman検定で確認</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">下位25%ユーザーの増加が最大</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">施策が消費の少なかったユーザーを引き上げた。底上げ効果として最もROIが高い施策パターンです。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">上位25%ユーザーのみ増加</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ヘビーユーザーだけが反応した施策。一般ユーザーへの浸透が不十分です。施策の認知率や利用ハードルを見直してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">3か月後も中央値の差が維持</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">習慣化が起きている。施策の継続・横展開を推奨します。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">3か月後に差が縮小</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">一時的な効果だった可能性。定期的な施策更新が必要です。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン2  平均は増えたが中央値はほぼ変わらない</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">Wilcoxon p=0.31, 中央値前後ほぼ同じ, 後の平均値は倍増</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">中央値ベースの検定では有意差なし。しかし平均値は大幅に上昇。</strong><br>少数のヘビーユーザーだけが大きく反応した可能性が高い。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">Wilcoxon有意差なし ≠ 施策に効果なし</strong>：一般ユーザーには効いておらず、上位少数ユーザーだけが反応した施策という解釈が自然です。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「平均値が上がったから施策成功」は過大評価</strong>：ポイント消費額のような右裾分布では、少数の大幅増加が平均を引き上げるだけで大多数のユーザーは変わっていない場合があります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">平均値と中央値の乖離を計算することが重要</strong>：乖離が大きいほど、一部ユーザーへの集中度が高いことを示します。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「少数のヘビーユーザーだけが反応した施策」なのか「全体に効いている施策」なのかを切り分けないと、施策を全体展開したときに期待外れの結果になります。上位ユーザーを除いた再分析で、一般ユーザーへの効果の有無を確認することが次の判断のために必要です。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">上位10%ユーザーを除いた再分析</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">ヘビーユーザー層の行動分析</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">上位10%除外後も有意差あり</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">一般ユーザー全体に施策効果が広がっている。本番展開の強い根拠になります。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">上位10%除外後に有意差なし</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">少数のヘビーユーザーだけが反応した施策。全体展開よりヘビーユーザー向けに絞り込んだ設計に変更することを検討してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン3  有意差なし</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">W=XXX, p=0.22, 前: 2,100円 → 後: 2,200円</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">施策前後で中央値に有意な変化は認められなかった。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">差が100円という小さな値ではノンパラメトリック検定での検出は難しい</strong>：中央値差を検出するのに必要なサンプル数はデータの分布形状に依存しますが、大きなIQRがあるデータでは数百〜数千組が必要になります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">施策の「認知率」も確認を</strong>：施策を知らなかったユーザーが対象に含まれていると、真の施策効果が薄まります。施策の到達率（メール開封率・通知タップ率など）を確認してください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">正しい報告</strong>：「Wilcoxon符号順位検定（p=0.22）。前後の中央値差は統計的有意差の水準に達しなかった。」</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">施策効果が薄まっている原因を特定することが次のアクションのために必要です。「施策が届いていないユーザー」が対象に混じっている場合は、ターゲットを絞るだけで効果が顕在化する可能性があります。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">必要対象ユーザー数の確認</strong>：n &lt; 30 の場合は検定力が不足します。</span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">施策対象の絞り込み</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">施策対象絞り込み後に有意差あり</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">全体施策では薄まっていた効果が、ターゲットを絞ることで顕在化しました。ターゲット施策として再設計してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">絞り込み後も有意差なし</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">施策の設計自体に問題がある可能性。ユーザーインタビューやUXテストで施策の認知・利用実態を確認してください。</div></div></div></div></div></div></div>`,
r_friedman:`<h3>どんな場面で使うか</h3><p>同一ユーザーを3時点以上追跡し、データが偏っている場合に使います。反復測定 ANOVA のノンパラメトリック版です。</p><div class="ex-box"><span class="exl">典型的な使用例</span>・施策前・1か月後・3か月後のポイント消費額（中央値）の変化<br>・四半期ごと3時点の購入回数の変化</div><div style="background:rgba(0,0,0,0.025);border-radius:8px;padding:12px 14px;margin:4px 0 12px 0"><div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:8px">3時点の繰り返し測定（ユーザーごとの軌跡）</div><svg viewBox="0 0 320 110" width="100%" height="110" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"><line x1="40" y1="95" x2="300" y2="95" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><line x1="70" y1="95" x2="70" y2="100" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><text x="70" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">施策前</text><line x1="170" y1="95" x2="170" y2="100" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><text x="170" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">1か月後</text><line x1="260" y1="95" x2="260" y2="100" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><text x="260" y="107" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">3か月後</text><path d="M 70 69 L 170 63 L 260 54" fill="none" stroke="#D4843A" stroke-width="1" stroke-linejoin="round"/><circle cx="70" cy="69" r="2.5" fill="#D4843A"/><circle cx="170" cy="63" r="2.5" fill="#D4843A"/><circle cx="260" cy="54" r="2.5" fill="#D4843A"/><path d="M 70 79 L 170 74 L 260 74" fill="none" stroke="#D4843A" stroke-width="1" stroke-linejoin="round"/><circle cx="70" cy="79" r="2.5" fill="#D4843A"/><circle cx="170" cy="74" r="2.5" fill="#D4843A"/><circle cx="260" cy="74" r="2.5" fill="#D4843A"/><path d="M 70 59 L 170 50 L 260 41" fill="none" stroke="#D4843A" stroke-width="1" stroke-linejoin="round"/><circle cx="70" cy="59" r="2.5" fill="#D4843A"/><circle cx="170" cy="50" r="2.5" fill="#D4843A"/><circle cx="260" cy="41" r="2.5" fill="#D4843A"/><path d="M 70 84 L 170 80 L 260 76" fill="none" stroke="#D4843A" stroke-width="1" stroke-linejoin="round"/><circle cx="70" cy="84" r="2.5" fill="#D4843A"/><circle cx="170" cy="80" r="2.5" fill="#D4843A"/><circle cx="260" cy="76" r="2.5" fill="#D4843A"/><path d="M 70 67 L 170 61 L 260 49" fill="none" stroke="#D4843A" stroke-width="1" stroke-linejoin="round"/><circle cx="70" cy="67" r="2.5" fill="#D4843A"/><circle cx="170" cy="61" r="2.5" fill="#D4843A"/><circle cx="260" cy="49" r="2.5" fill="#D4843A"/><text x="160" y="8" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">各線 = 1ユーザーの時点別ポイント消費額</text></svg></div><h3>データ構成</h3><div style="font-size:11.5px;line-height:1.7;color:var(--color-text-secondary);margin-bottom:8px">検定を実行するために、以下の形式にデータを準備してください。</div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">① 元データの形（縦持ち：1行 = 1ユーザー × 1時点）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">period</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">point_spend</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">before</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1,800</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">month1</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">2,100</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">month3</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">2,900</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">before</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">200</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">同一 user_id が時点数分の行を持ちます。period は before / month1 / month3 などの文字列ラベル。</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">② 検定用に横持ち（wide形式）に変換（加工コード）</div><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:7px 10px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.85;margin:5px 0"># 縦持ち → 横持ちに変換<br>wide = df.pivot(index='user_id', columns='period', values='point_spend')<br>wide = wide[['before','month1','month3']].dropna()  # 時点順に並べ、欠損ユーザーを除外</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">③ 検定に渡すデータの形（横持ち）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">point_spend_before</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">point_spend_month1</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">point_spend_month3</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1,800</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">2,100</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">2,900</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">200</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">240</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">180</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">途中の時点が欠損しているユーザーはそのユーザー全体が除外されます。離脱率が高い場合は結果の解釈に注意してください。</div></div><h3>実行手順</h3><div style="margin-top:4px"><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">1</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">データをワイド形式に整形する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">wide = df.pivot(index='user_id', columns='period', values='point_spend')<br>wide = wide[['before', 'month1', 'month3']]</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">各時点の中央値を確認</div>print(wide.median().round(0))<br># before: 2100 / month1: 2400 / month3: 2800</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">2</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">Friedman 検定を実行する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">from scipy import stats<br>stat, p_value = stats.friedmanchisquare(<br>    wide['before'], wide['month1'], wide['month3'])<br>print('χ²=', round(stat,3), 'p値=', round(p_value,4))</div><div style="background:var(--color-background-success);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.7;margin:6px 0"><strong style="color:var(--color-text-primary)">結果の読み方</strong><br>p値 &lt; 0.05 → 時点間に有意差あり → 多重比較へ<br>p値 ≥ 0.05 → 有意差があるとは言えない → ここで終了</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">3</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">多重比較（Dunn 法 + Bonferroni 補正）を実行する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">import scikit_posthocs as sp<br>long = wide.reset_index().melt(id_vars='user_id', var_name='period', value_name='value')<br>result = sp.posthoc_dunn(long, val_col='value', group_col='period', p_adjust='bonferroni')<br>print(result)</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">出力の見方</div>p &lt; 0.05 → そのペアの時点間に有意差あり</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">4</span></div><div style="padding-left:10px;padding-bottom:4px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">結果をまとめる</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">報告例</div>3時点でポイント消費額を比較した結果、有意差が認められた（Friedman 検定、χ²=18.4、p&lt;0.001）。<br>Dunn 法（Bonferroni 補正）の結果、施策前 vs 3か月後に有意差が認められた（p=0.002）。<br>中央値（IQR）：施策前 2,100（900–4,200）、1か月後 2,400（1,100–5,100）、3か月後 2,800（1,400–5,800）円</div></div></div></div></div><h3>結果の読み方・解釈パターン</h3><div style="margin-top:4px"><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン1  右肩上がりのトレンドが有意</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">χ²r=18.4, p<0.001, Dunn法: 施策前 vs 3か月後のみ有意</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">3時点間に有意差あり。施策前→3か月後の変化が最も大きい。</strong><br>1か月後→3か月後は有意でないため「急激な変化」ではなく「緩やかな蓄積」が起きています。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「徐々に効いてくる施策」というキャラクタリゼーションができる</strong>：即効性は低いが長期的には効果があるタイプの施策です。3〜6か月スパンでの評価が適切という示唆が得られます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">中央値の絶対値の変化を示すと説得力が増す</strong>：「施策前2,100円（IQR:900-4,200）→3か月後2,800円（IQR:1,400-5,800）」という形で具体的な数値を添えてください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「1か月後が最大で3か月後は横ばい」の可能性もある</strong>：各時点の中央値をグラフで確認してトレンドの形状を把握してください。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">施策の継続投資を判断するためには、効果の伸びが今後も続くのかを確認することが必要です。また1か月後と3か月後でどちらの変化が大きいかによって「今後も施策を続けるべきか」「追加の刺激が必要か」の判断が変わります。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">6か月後・1年後の追跡調査を計画</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">各時点の中央値・IQRを時系列グラフ化</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">増加が1か月後から3か月後も継続</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">時間とともに効果が蓄積している。施策の継続期間を延ばすと更なる改善が見込めます。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">1か月後が最大でその後横ばい</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">施策効果が頭打ち。新たな刺激を2か月後頃に投入する二段ロケット設計を検討してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン2  一時的な上昇後に元に戻る</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">χ²r=12.3, p=0.002, キャンペーン期中のみ有意</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">キャンペーン期中だけ中央値が上昇し、終了後は元に戻った。キャンペーン依存型の行動。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">行動変容ではなく「インセンティブへの一時的な反応」だった可能性</strong>：キャンペーンを止めれば元に戻る施策は、LTV向上ではなくコスト増加だけをもたらす恐れがあります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「上昇幅の大きさ」と「期間」のバランスを確認</strong>：+1,000円の増加がキャンペーン期中の2か月続いたなら、その累積売上増加額とキャンペーンコストを比較してください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">一時的な上昇でも「初回購入体験」を作れた場合は価値がある</strong>：キャンペーン期中に初めて購入した人が、その後も購入を続けているかを確認してください（コホート追跡）。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">キャンペーン終了後に離脱したユーザーの属性を分析することで、「次回はどのタイミングでリテンション施策を打てばよいか」が分かります。原因を特定せずに「また同じキャンペーンを打つ」という判断は、同じパターンを繰り返すだけです。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">リテンション施策の即時追加設計</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">キャンペーン終了後の離脱ユーザー属性分析</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">離脱したユーザーが低ランク層</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">インセンティブ感度の高いユーザーが反応していたが定着していない。ランクアップ体験との組み合わせで習慣化を狙う設計を検討してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">リテンション施策追加後に元の水準を上回る</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">二段階設計（キャンペーン＋リテンション）が有効と確認。この組み合わせをテンプレートとして活用してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン3  有意差なし</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">χ²r=2.5, p=0.28</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">3時点間でポイント消費額の分布に有意な変化は見られなかった。多重比較は実施しません。</strong></div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">各時点の中央値が実際にどう動いているかを確認</strong>：有意差なしでも「2,100→2,200→2,250円」というわずかな上昇トレンドがあれば、施策継続の判断材料になります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">途中の欠損ユーザーが除外されていることの影響</strong>：施策効果があったユーザーが途中で離脱（または休眠）した場合、そのユーザーが分析から除外されるため効果が過小評価される可能性があります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">正しい報告</strong>：「Friedman検定（χ²r=2.5, p=0.28）。3時点間に有意差は認められなかった。多重比較は実施しなかった。」</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">有意差なしの原因を切り分けることが次のアクションに直結します。「測定間隔が長すぎて変化を見逃した」なら間隔を短縮し、「施策の強度が不足していた」なら施策を強化することで、同じ失敗を繰り返さずに済みます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">時点間隔の見直し</strong></span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">施策の設計見直し</strong></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">時点間隔を短縮後に有意差あり</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">施策効果が短期間に集中していた。より短い間隔での測定が適切だったことが判明しました。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">施策強化後に有意差あり</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">施策の強度が不十分だったことが原因だった可能性。今回の結果を「必要な効果量の下限」として次回施策設計に活かしてください。</div></div></div></div></div></div></div>`,
r_mcnemar:`<h3>どんな場面で使うか</h3><p>同一ユーザーの施策前後で「あり（1）/なし（0）」の変化を検定します。「変化したユーザーだけ」が検定に使われます。</p><div class="ex-box"><span class="exl">典型的な使用例</span>・キャンペーン前後で「購入あり/なし」の割合が変化したか<br>・新機能前後で「ポイント利用あり/なし」が変化したか<br>・通知変更前後で「アプリ起動あり/なし」が変化したか</div><div style="background:rgba(0,0,0,0.025);border-radius:8px;padding:12px 14px;margin:4px 0 12px 0"><div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:8px">施策前後の変化パターン（2×2分割表）</div><svg viewBox="0 0 300 130" width="100%" height="130" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"><text x="110" y="17" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">施策後：あり</text><text x="210" y="17" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">施策後：なし</text><text x="52" y="52" text-anchor="end" transform="rotate(-90,52,52)" font-family="sans-serif" font-size="8" fill="#8A8A8A">施策前：あり</text><text x="52" y="97" text-anchor="end" transform="rotate(-90,52,97)" font-family="sans-serif" font-size="8" fill="#8A8A8A">施策前：なし</text><rect x="60" y="25" width="100" height="45" fill="#8A8A8A" opacity="0.15" stroke="#8A8A8A" stroke-width="0.5" stroke-opacity="0.4"/><text x="110" y="43" text-anchor="middle" font-family="sans-serif" font-size="9" fill="var(--color-text-primary)">a=290</text><text x="110" y="56" text-anchor="middle" font-family="sans-serif" font-size="8" fill="var(--color-text-secondary)">（変化なし）</text><rect x="160" y="25" width="100" height="45" fill="#D4843A" opacity="0.5" stroke="#8A8A8A" stroke-width="0.5" stroke-opacity="0.4"/><text x="210" y="43" text-anchor="middle" font-family="sans-serif" font-size="9" fill="var(--color-text-primary)">b=110</text><text x="210" y="56" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#D4843A">→なし（重要）</text><rect x="60" y="70" width="100" height="45" fill="#2B9B78" opacity="0.5" stroke="#8A8A8A" stroke-width="0.5" stroke-opacity="0.4"/><text x="110" y="88" text-anchor="middle" font-family="sans-serif" font-size="9" fill="var(--color-text-primary)">c=180</text><text x="110" y="101" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2B9B78">→あり（重要）</text><rect x="160" y="70" width="100" height="45" fill="#8A8A8A" opacity="0.15" stroke="#8A8A8A" stroke-width="0.5" stroke-opacity="0.4"/><text x="210" y="88" text-anchor="middle" font-family="sans-serif" font-size="9" fill="var(--color-text-primary)">d=420</text><text x="210" y="101" text-anchor="middle" font-family="sans-serif" font-size="8" fill="var(--color-text-secondary)">（変化なし）</text><text x="150" y="125" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">b と c（変化したユーザー）だけが検定に使われます</text></svg></div><h3>データ構成</h3><div style="font-size:11.5px;line-height:1.7;color:var(--color-text-secondary);margin-bottom:8px">検定を実行するために、以下の形式にデータを準備してください。</div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">① 元データの形（縦持ち：1行 = 1ユーザー × 1時点）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">period</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">purchased</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">before</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">0</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">after</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">before</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">after</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin
