<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>統計検定セレクター — アプリ・販売データ分析版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f7f6f2;--surface:#fff;--surface2:#f0efe9;--border:#e2e0d8;--border-strong:#c8c6bc;
    --text:#1a1916;--text-muted:#6b6960;--text-faint:#a09e96;
    --accent:#1e4fd8;--accent-bg:#eef2fd;--accent-border:#b8c8f5;
    --amber-bg:#fffbeb;--amber-border:#fcd34d;
    --coral-bg:#fef2f2;--coral-border:#fca5a5;
    --purple-bg:#f5f3ff;--purple-border:#c4b5fd;
    --teal-bg:#f0fdfa;--teal-border:#5eead4;
    --radius:10px;--radius-lg:16px;
    --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
    --shadow-lg:0 2px 8px rgba(0,0,0,.08),0 12px 40px rgba(0,0,0,.08);
    --tr:.22s cubic-bezier(.4,0,.2,1);
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#141412;--surface:#1e1e1b;--surface2:#252520;--border:#2e2e28;--border-strong:#3e3e36;
    --text:#f0ede6;--text-muted:#9a9890;--text-faint:#5a5850;
    --accent:#6b8ef0;--accent-bg:#1a2140;--accent-border:#2a3e80;
    --amber-bg:#1c1200;--amber-border:#78350f;
    --coral-bg:#1e0a0a;--coral-border:#7f1d1d;
    --purple-bg:#1e1030;--purple-border:#4c1d95;
    --teal-bg:#021e1c;--teal-border:#134e4a;
    --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
    --shadow-lg:0 2px 8px rgba(0,0,0,.4),0 12px 40px rgba(0,0,0,.3);
  }}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.7;font-size:15px}
  .site-header{border-bottom:1px solid var(--border);background:var(--surface);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
  .logo{display:flex;align-items:baseline;gap:10px}
  .logo-title{font-family:'DM Serif Display',serif;font-size:18px;letter-spacing:-.01em}
  .logo-badge{font-size:11px;font-weight:500;padding:2px 8px;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-border);border-radius:20px}
  .header-sub{font-size:11px;color:var(--text-faint)}
  .page{max-width:680px;margin:0 auto;padding:40px 20px 80px}
  .progress-wrap{margin-bottom:28px}
  .progress-bar-track{height:2px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:10px}
  .progress-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1);width:0%}
  .breadcrumb{display:flex;flex-wrap:wrap;gap:4px 6px;align-items:center;min-height:20px}
  .bc-item{font-size:11px;color:var(--text-faint);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bc-sep{font-size:11px;color:var(--text-faint);opacity:.5}
  .q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 28px 20px;box-shadow:var(--shadow);animation:slideIn .28s cubic-bezier(.4,0,.2,1)}
  @keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .step-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;margin-bottom:14px;letter-spacing:.03em}
  .step-dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .q-text{font-size:17px;font-weight:500;line-height:1.5;margin-bottom:10px;letter-spacing:-.01em}
  .q-hint{font-size:12px;color:var(--text-muted);line-height:1.7;background:var(--surface2);border-left:2px solid var(--accent-border);padding:10px 14px;margin-bottom:20px;border-radius:0 6px 6px 0}
  .q-hint strong{font-weight:500;color:var(--text)}
  .options{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
  .opt-btn{display:block;width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 40px 13px 16px;cursor:pointer;transition:border-color var(--tr),background var(--tr),box-shadow var(--tr);font-family:'Noto Sans JP',sans-serif;position:relative}
  .opt-btn::after{content:'';position:absolute;right:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;border:1px solid var(--border);transition:border-color var(--tr),background var(--tr)}
  .opt-btn:hover{border-color:var(--accent);background:var(--accent-bg);box-shadow:0 0 0 3px rgba(30,79,216,.07)}
  .opt-btn:hover::after{border-color:var(--accent);background:var(--accent);box-shadow:inset 0 0 0 4px var(--accent-bg)}
  .opt-btn:active{transform:scale(.99)}
  .opt-label{display:block;font-size:13.5px;font-weight:500;color:var(--text);line-height:1.4}
  .opt-sub{display:block;font-size:11.5px;color:var(--text-muted);margin-top:3px;line-height:1.5}
  .back-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text-faint);display:inline-flex;align-items:center;gap:5px;padding:4px 0;font-family:'Noto Sans JP',sans-serif;transition:color var(--tr)}
  .back-btn:hover{color:var(--text-muted)}
  .back-arrow{width:14px;height:14px;border-left:1.5px solid currentColor;border-bottom:1.5px solid currentColor;transform:rotate(45deg);margin-right:2px;border-radius:1px}
  .result-card{border-radius:var(--radius-lg);padding:28px;border:1px solid;box-shadow:var(--shadow-lg);animation:slideIn .32s cubic-bezier(.4,0,.2,1)}
  .result-eyebrow{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
  .result-name{font-family:'DM Serif Display',serif;font-size:22px;line-height:1.3;margin-bottom:14px;letter-spacing:-.02em}
  .result-desc{font-size:13.5px;line-height:1.8;margin-bottom:16px;opacity:.85}
  .result-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
  .result-tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;border:1px solid;letter-spacing:.02em}
  .result-note{font-size:12px;line-height:1.7;padding:10px 14px;border-radius:var(--radius);border:1px solid;margin-bottom:20px}
  .result-note strong{font-weight:500}
  .result-actions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
  .btn-primary{font-size:12.5px;font-weight:500;padding:8px 16px;border-radius:var(--radius);border:1px solid;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:opacity var(--tr),transform var(--tr)}
  .btn-primary:active{transform:scale(.98)}
  .btn-ghost{font-size:12.5px;padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text-muted);font-family:'Noto Sans JP',sans-serif;transition:background var(--tr),color var(--tr)}
  .btn-ghost:hover{background:var(--surface2);color:var(--text)}
  .btn-detail{font-size:12.5px;font-weight:500;padding:8px 18px;border-radius:var(--radius);border:1px solid;cursor:pointer;font-family:'Noto Sans JP',sans-serif;background:transparent;transition:background var(--tr),opacity var(--tr)}
  .path-summary{border-top:1px solid;padding-top:16px;margin-top:4px}
  .path-title{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px;opacity:.5}
  .path-rows{display:flex;flex-direction:column;gap:5px}
  .path-row{display:flex;gap:10px;font-size:11.5px;align-items:baseline}
  .path-step{flex-shrink:0;opacity:.45;min-width:52px;font-size:10.5px;letter-spacing:.03em}
  .path-val{opacity:.75}
  .theme-blue .result-card{background:var(--accent-bg);border-color:var(--accent-border)}
  .theme-blue .result-eyebrow{color:var(--accent)}
  .theme-blue .result-name{color:#0f2a7a}
  .theme-blue .result-desc{color:#1e3a8a}
  .theme-blue .result-tag{background:rgba(30,79,216,.08);border-color:var(--accent-border);color:var(--accent)}
  .theme-blue .result-note{background:rgba(255,255,255,.6);border-color:var(--accent-border);color:#1e3a8a}
  .theme-blue .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .theme-blue .btn-primary:hover{opacity:.88}
  .theme-blue .btn-detail{border-color:var(--accent-border);color:var(--accent)}
  .theme-blue .btn-detail:hover{background:rgba(30,79,216,.08)}
  .theme-blue .path-summary{border-color:var(--accent-border);color:#1e3a8a}
  .theme-amber .result-card{background:var(--amber-bg);border-color:var(--amber-border)}
  .theme-amber .result-eyebrow{color:#b45309}
  .theme-amber .result-name{color:#78350f}
  .theme-amber .result-desc{color:#92400e}
  .theme-amber .result-tag{background:rgba(245,158,11,.1);border-color:var(--amber-border);color:#b45309}
  .theme-amber .result-note{background:rgba(255,255,255,.6);border-color:var(--amber-border);color:#92400e}
  .theme-amber .btn-primary{background:#d97706;border-color:#d97706;color:#fff}
  .theme-amber .btn-primary:hover{opacity:.88}
  .theme-amber .btn-detail{border-color:var(--amber-border);color:#b45309}
  .theme-amber .btn-detail:hover{background:rgba(245,158,11,.08)}
  .theme-amber .path-summary{border-color:var(--amber-border);color:#92400e}
  .theme-coral .result-card{background:var(--coral-bg);border-color:var(--coral-border)}
  .theme-coral .result-eyebrow{color:#dc2626}
  .theme-coral .result-name{color:#7f1d1d}
  .theme-coral .result-desc{color:#991b1b}
  .theme-coral .result-tag{background:rgba(239,68,68,.08);border-color:var(--coral-border);color:#dc2626}
  .theme-coral .result-note{background:rgba(255,255,255,.6);border-color:var(--coral-border);color:#991b1b}
  .theme-coral .btn-primary{background:#dc2626;border-color:#dc2626;color:#fff}
  .theme-coral .btn-primary:hover{opacity:.88}
  .theme-coral .btn-detail{border-color:var(--coral-border);color:#dc2626}
  .theme-coral .btn-detail:hover{background:rgba(239,68,68,.08)}
  .theme-coral .path-summary{border-color:var(--coral-border);color:#991b1b}
  .theme-purple .result-card{background:var(--purple-bg);border-color:var(--purple-border)}
  .theme-purple .result-eyebrow{color:#7c3aed}
  .theme-purple .result-name{color:#4c1d95}
  .theme-purple .result-desc{color:#5b21b6}
  .theme-purple .result-tag{background:rgba(124,58,237,.08);border-color:var(--purple-border);color:#7c3aed}
  .theme-purple .result-note{background:rgba(255,255,255,.6);border-color:var(--purple-border);color:#5b21b6}
  .theme-purple .btn-primary{background:#7c3aed;border-color:#7c3aed;color:#fff}
  .theme-purple .btn-primary:hover{opacity:.88}
  .theme-purple .btn-detail{border-color:var(--purple-border);color:#7c3aed}
  .theme-purple .btn-detail:hover{background:rgba(124,58,237,.08)}
  .theme-purple .path-summary{border-color:var(--purple-border);color:#5b21b6}
  .theme-teal .result-card{background:var(--teal-bg);border-color:var(--teal-border)}
  .theme-teal .result-eyebrow{color:#0d9488}
  .theme-teal .result-name{color:#134e4a}
  .theme-teal .result-desc{color:#115e59}
  .theme-teal .result-tag{background:rgba(20,184,166,.08);border-color:var(--teal-border);color:#0d9488}
  .theme-teal .result-note{background:rgba(255,255,255,.6);border-color:var(--teal-border);color:#115e59}
  .theme-teal .btn-primary{background:#0d9488;border-color:#0d9488;color:#fff}
  .theme-teal .btn-primary:hover{opacity:.88}
  .theme-teal .btn-detail{border-color:var(--teal-border);color:#0d9488}
  .theme-teal .btn-detail:hover{background:rgba(20,184,166,.08)}
  .theme-teal .path-summary{border-color:var(--teal-border);color:#115e59}
  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal-sheet{background:var(--surface);width:100%;max-width:720px;max-height:92vh;border-radius:20px 20px 0 0;overflow:hidden;display:flex;flex-direction:column;transform:translateY(40px);transition:transform .32s cubic-bezier(.4,0,.2,1)}
  .modal-overlay.open .modal-sheet{transform:translateY(0)}
  .modal-handle-bar{width:36px;height:4px;background:var(--border-strong);border-radius:2px;margin:12px auto 0;flex-shrink:0}
  .modal-header{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 24px 14px;border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
  .modal-title{font-family:'DM Serif Display',serif;font-size:19px;line-height:1.3;letter-spacing:-.02em}
  .modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-faint);padding:2px 6px;border-radius:6px;line-height:1;transition:background var(--tr),color var(--tr);flex-shrink:0;margin-top:2px}
  .modal-close:hover{background:var(--surface2);color:var(--text)}
  .modal-body{overflow-y:auto;padding:24px 24px 40px;flex:1}
  .modal-body h3{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-muted);margin:28px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
  .modal-body h3:first-child{margin-top:0}
  .modal-body p{font-size:13.5px;line-height:1.85;color:var(--text-muted);margin-bottom:10px}
  .modal-body p strong{font-weight:500;color:var(--text)}
  .modal-body ul,.modal-body ol{padding-left:1.5em;font-size:13.5px;line-height:1.85;color:var(--text-muted);margin-bottom:10px}
  .modal-body li{margin-bottom:4px}
  .modal-body li strong{font-weight:500;color:var(--text)}
  .formula-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;font-family:Georgia,serif;font-size:15px;text-align:center;margin:12px 0;line-height:2;color:var(--text)}
  .formula-box .fl{font-family:'Noto Sans JP',sans-serif;font-size:11px;color:var(--text-faint);text-align:left;margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.06em}
  .dtable{width:100%;border-collapse:collapse;font-size:12.5px;margin:12px 0}
  .dtable th{background:var(--surface2);padding:7px 10px;font-size:11px;font-weight:500;color:var(--text-muted);text-align:center;border:1px solid var(--border)}
  .dtable td{padding:7px 10px;text-align:center;border:1px solid var(--border);color:var(--text)}
  .dtable td.hl{font-weight:500;color:var(--accent);background:var(--accent-bg)}
  .dtable td.mu{color:var(--text-faint)}
  .dtable td.la{text-align:left}
  .ex-box{background:var(--surface2);border-radius:var(--radius);padding:14px 16px;margin:12px 0;font-size:13px;line-height:1.8;border-left:3px solid var(--accent-border)}
  .ex-box .exl{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:6px}
  .warn-box{background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:var(--radius);padding:12px 14px;margin:12px 0;font-size:12.5px;line-height:1.8;color:#92400e}
  .warn-box strong{font-weight:500;color:#78350f}
  .ctable{width:100%;border-collapse:collapse;font-size:12px;margin:12px 0}
  .ctable th{background:var(--surface2);padding:7px 10px;font-size:11px;font-weight:500;color:var(--text-muted);text-align:left;border:1px solid var(--border)}
  .ctable td{padding:7px 10px;border:1px solid var(--border);color:var(--text);vertical-align:top;line-height:1.6}
  .intro{margin-bottom:32px}
  .intro-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .intro-heading{font-family:'DM Serif Display',serif;font-size:28px;line-height:1.25;letter-spacing:-.02em;margin-bottom:10px}
  .intro-sub{font-size:13px;color:var(--text-muted);line-height:1.7}
  .divider{height:1px;background:var(--border);margin:32px 0}
  .site-footer{text-align:center;font-size:11px;color:var(--text-faint);padding:0 20px 40px;max-width:680px;margin:0 auto;line-height:1.8}
  @media(max-width:600px){
    .page{padding:24px 14px 60px}.q-card{padding:20px 18px 16px}.q-text{font-size:15px}
    .intro-heading{font-size:22px}.result-name{font-size:18px}.result-card{padding:20px}
    .site-header{padding:0 14px}.logo-title{font-size:15px}.header-sub{display:none}
    .modal-body{padding:16px 16px 32px}.modal-header{padding:12px 16px}
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">
    <span class="logo-title">StatSelect</span>
    <span class="logo-badge">分析版</span>
  </div>
  <span class="header-sub">健康アプリ・ポイント・販売データ向け</span>
</header>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal-sheet">
    <div class="modal-handle-bar"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="page">
  <div class="intro">
    <div class="intro-label">統計検定手法 ナビゲーター</div>
    <h1 class="intro-heading">分析したい指標から<br>検定手法を選ぶ。</h1>
    <p class="intro-sub">LTV・契約率・継続率・ポイント消費額・ミッション達成率など、<strong>指標の種類</strong>を選ぶだけで適切な統計検定手法が決まります。統計用語の知識は不要です。</p>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-bar"></div></div>
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>
  <div id="main"></div>
</div>

<div class="divider"></div>
<footer class="site-footer">
  参考：大林 準「統計検定手法の選び方 ― 基本編 ―」天理医学紀要 2022;25(1):60-65　／　このツールは教育・参考目的です。
</footer>

<script>
const D={

econdary);font-size:10.5px;white-space:nowrap;text-align:center">B（通知OFF）</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">6,500</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U004</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">B（通知OFF）</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">7,400</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">group 列でA/Bを区別し、比較したい指標列（steps）を用意します。欠損値のある行は事前に除外してください。</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">② 検定用に2変数に分割（加工コード）</div><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:7px 10px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.85;margin:5px 0">group_a = df[df['group']=='A（通知ON）']['steps'].dropna()<br>group_b = df[df['group']=='B（通知OFF）']['steps'].dropna()</div></div><h3>実行手順</h3><div style="margin-top:4px"><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color- color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">print(group_a.describe())<br>print(group_b.describe())</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">確認するポイント</div>平均 ≈ 中央値 → 正規分布に近い ✓<br>平均 &gt;&gt; 中央値 → 偏りあり → ノンパラメトリックに切り替え</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">3</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">Welch's t 検定を実行する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">from scipy import stats<br>stat, p_value = stats.ttest_ind(group_a, group_b, equal_var=False)<br>print('t統計量:', round(stat,3), 'p値:', round(p_value,4))</div><div style="background:var(--color-background-success);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.7;margin:6px 0"><strong style="color:var(--color-text-primary)">結果の読み方</strong><br>p値 &lt; 0.05 → 2群間に統計的に有意な差あり<br>p値 ≥ 0.05 → 差があるとは言えない</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">4</span></div><div style="padding-left:10px;padding-bottom:4px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">結果をまとめる</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">報告例</div>通知ON群（n=1,200）の平均歩数は 7,800±2,100 歩、通知OFF群（n=800）は 7,200±2,400 歩であり、両群間に有意差が認められた（Welch's t 検定、p&lt;0.001）。</div><div style="font-size:11px;color:var(--color-text-tertiary);margin-top:4px">※ 平均±標準偏差（SD）で報告します。</div></div></div></div></div><h3>結果の読み方・解釈パターン</h3><div style="margin-top:4px"><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン1  有意差あり・差が大きい</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">p=0.001, 通知ON: 7,800歩 vs OFF: 7,200歩（差+600歩）</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">両群の平均値に統計的に有意な差があると確認できた状態。</strong><br>数値をそのまま使って「通知ONにすることで平均600歩（+8.3%）の増加が見込める」と言えます。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">施策効果の定量報告が可能</strong>：「通知ON群は OFF群と比べ平均+600歩（95%CI: +420〜+780歩）高かった（p=0.001）」と具体的な数値と信頼区間を示せます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">施策の費用対効果計算の根拠になる</strong>：600歩増加 × ユーザー数 × ポイント付与コスト などで施策ROIを試算できます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">有意差は「差が大きい」ことを保証しない</strong>：n が大きいほど小さな差でも有意になります。差の大きさ（効果量）を別途確認してください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">報告時の必須セット</strong>：平均値±SD、サンプル数、t値、p値、Cohen's d、95%信頼区間をセットで記載することがベストプラクティスです。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">有意差があっても「差が実務的に意味のある大きさか」は別問題です。n=10万規模では+20歩の差でも有意になります。効果量（Cohen's d）を確認しないと「有意差あり＝施策採用」という誤った意思決定につながります。また全体での差が特定セグメントのみで起きている場合、施策対象を絞ることで費用対効果を高められます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">Cohen's d で効果量を算出</strong>：d = 差の平均 / プールされたSD。</span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">会員ランク・年齢層別でセグメント再検定</strong>：効果が出やすいセグメントを特定できます。</span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">d ≥ 0.8（大）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">施策効果は大きく、実務的にも十分な大きさ。本番展開の根拠として使えます。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">d = 0.5〜0.8（中）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">中程度の効果。施策コストとROIを計算してから本番判断をしてください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">d = 0.2〜0.5（小）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">効果は小さい。施策コストと照らし合わせてROIを計算してから判断してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">d < 0.2（ごく小）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">有意差はあるが実務上ほぼ無意味な差。施策の採用は慎重に。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">セグメント別で差が消える</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">全体の差が特定セグメントのみで生じている可能性。施策対象を絞った方が費用対効果が高いかもしれません。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">セグメント別でより大きな差</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">特定セグメントへの集中施策で効果をさらに高められます。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン2  有意差あり・差が微小</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">p=0.04, 通知ON: 7,810歩 vs OFF: 7,790歩（差+20歩）</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">統計的には有意でも、差がほぼゼロに近い状態。</strong><br>n が数万以上になると20歩の差でも有意になります。「有意差あり＝施策効果あり」ではありません。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「有意差あり」だけで施策採用を決めてはいけない</strong>：+20歩は日常の歩数変動（±1,000歩程度）に埋もれる数値です。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">MDE（最小検出効果）の事前設定が必要</strong>：「500歩以上の差がなければ施策採用しない」という基準を先に決めておくことで、このような問題を防げます。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">大規模データは「統計的有意性」と「実務的重要性」が乖離しやすい</strong>：n=10万では0.5%の差でも有意になります。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">有意差あり＝施策効果ありという誤解を防ぐため、効果量の確認が必須です。また次回以降のテストで「どれだけの差が出れば採用するか」を先に決める設計（MDE設定）が必要です。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">Cohen's d を必ず計算</strong>：d < 0.2 は「ほぼ無意味」。</span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">MDE（最小検出効果）を事前設定</strong>：実務上意味のある差（例：+500歩以上）を先に定義してください。</span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">d < 0.2</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">有意差はあるが実務上無意味な差。施策変更の根拠にはなりません。次回テストではMDEを先に設定して設計してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">MDEを下回っている</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">検出できても意味がない差。A/Bテストの設計段階に立ち返り、必要なサンプル数と検出したい差の大きさを再設定してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン3  有意差なし</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">p=0.38, 通知ON: 7,800歩 vs OFF: 7,650歩</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">「差がない」ではなく「差があるとは統計的に言えなかった」が正確な表現。</strong><br>3つの可能性が残ります：①サンプルが足りなかった、②本当に差がない、③測定期間が短すぎた。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「効果なし」と結論するのは早計</strong>：+150歩の差が「あるが有意でなかった」だけの可能性があります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">第二種の過誤（偽陰性）に注意</strong>：本当は差があるのに検出できなかった場合。検定力分析で確認してください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「p=0.38なので効果なし」という報告は不正確</strong>：「統計的有意差は認められなかった（p=0.38）」が正しい表現です。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「有意差なし＝施策効果なし」という誤った結論を防ぐため、今回のサンプル数で「+500歩の差」を検出するのに十分だったかを確認することが必要です。不十分だった場合は、同じ施策を大きなサンプルで再テストすれば有意差が出る可能性があります。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">検定力分析</strong>：<code style="background:rgba(0,0,0,0.05);padding:1px 5px;border-radius:3px;font-size:10px">TTestIndPower().solve_power(effect_size=0.2, alpha=0.05, power=0.8)</code></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">必要n >> 実際のn</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">サンプル不足で差が検出できなかった可能性。観察期間を延ばすか、より大規模なテストを再設計してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">必要n ≒ 実際のn</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">十分なサンプルがあっても差が出なかった。施策の内容が弱いか、本当に差がない可能性が高いです。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">必要n ≤ 実際のn</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">十分なサンプルで差が出なかった。施策効果がない可能性が高い。別の施策への切り替えを検討してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン4  両群で分布の形が大きく違う</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">p=0.02 だが通知ON群のヒストグラムが右に歪んでいる</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">t検定の前提（両群が正規分布）が満たされていない可能性があります。</strong><br>正規性の仮定が崩れていると、p値の信頼性自体が下がります。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">この結果は信頼性が低い</strong>：分布が大きく歪んでいる場合、Welch's t 検定の p値は過小評価または過大評価される恐れがあります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">特に購入金額・ポイント消費額は右裾が長くなりやすい</strong>：これらの指標には最初からノンパラメトリック検定（Mann-Whitney U）を使うのが適切です。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">t検定はデータが正規分布していることを前提にしています。この前提が崩れると検定の結果が信頼できなくなります。ヒストグラムや正規性検定で前提を確認し、違反している場合は適切な検定に切り替えることで、誤った意思決定を防げます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">Mann-Whitney U 検定に切り替え</strong>：正規性が確認できない場合はノンパラメトリック検定を使ってください。</span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">Shapiro-Wilk 検定で正規性を再確認</strong>：<code style="background:rgba(0,0,0,0.05);padding:1px 5px;border-radius:3px;font-size:10px">from scipy import stats; stats.shapiro(group_a)</code></span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">Mann-Whitney でも有意差あり</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">両手法で有意差が確認できた。ノンパラメトリックの結果の方が信頼性が高いです。中央値（IQR）で報告してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">Mann-Whitney では有意差なし</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">t検定の結果は外れ値・分布の歪みに引きずられた偽陽性だった可能性があります。Mann-Whitney の結果を採用してください。</div></div></div></div></div></div></div><div class="warn-box"><strong style="color:var(--color-text-primary)">よくある間違い：</strong>同一ユーザーの前後データに使ってしまう → 正しくは <strong style="color:var(--color-text-primary)">対応のある t 検定</strong>を使います。</div>`,
r_anova1:`<h3>どんな場面で使うか</h3><p>3グループ以上の連続指標を同時に比較します。まず全体に差があるかを確認し、あれば多重比較でどの群間に差があるかを特定します。</p><div class="ex-box"><span class="exl">典型的な使用例</span>・ブロンズ / シルバー / ゴールド会員の平均客単価<br>・施策パターン A / B / C の平均ポイント付与数<br>・登録経路（オーガニック / 広告 / 紹介）別の平均ログイン回数</div><div style="background:rgba(0,0,0,0.025);border-radius:8px;padding:12px 14px;margin:4px 0 12px 0"><div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:8px">3グループ間の平均値比較（棒グラフのイメージ）</div><svg viewBox="0 0 320 100" width="100%" height="100" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"><line x1="30" y1="85" x2="310" y2="85" stroke="var(--color-text-tertiary)" stroke-width="0.75" opacity="0.4"/><rect x="36" y="55" width="48" height="30" fill="#4B8FD4" opacity="0.75" rx="3"/><text x="60" y="52" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#4B8FD4">3000</text><text x="60" y="97" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">ブロンズ</text><rect x="126" y="30" width="48" height="55" fill="#D4843A" opacity="0.75" rx="3"/><text x="150" y="27" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#D4843A">5500</text><text x="150" y="97" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">シルバー</text><rect x="216" y="5" width="48" height="80" fill="#2B9B78" opacity="0.75" rx="3"/><text x="240" y="2" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2B9B78">8000</text><text x="240" y="97" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">ゴールド</text></svg></div><h3>データ構成</h3><div style="font-size:11.5px;line-height:1.7;color:var(--color-text-secondary);margin-bottom:8px">検定を実行するために、以下の形式にデータを準備してください。</div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">① 元データの形（1行 = 1ユーザー）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">rank</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">ltv</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">bronze</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">3,200</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">silver</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">6,800</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U003</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">gold</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">14,500</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U004</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">bronze</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">2,900</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">rank 列に3値以上のグループラベル、指標列（ltv）を用意します。</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">② 検定用に群ごとの Series に分割（加工コード）</div><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:7px 10px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.85;margin:5px 0">bronze = df[df['rank']=='bronze']['ltv'].dropna()<br>silver = df[df['rank']=='silver']['ltv'].dropna()<br>gold   = df[df['rank']=='gold']['ltv'].dropna()</div></div><h3>実行手順</h3><div style="margin-top:4px"><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">1</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">3群のデータを用意する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">bronze = df[df['rank']=='bronze']['ltv']<br>silver = df[df['rank']=='silver']['ltv']<br>gold   = df[df['rank']=='gold']['ltv']</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">確認</div>各群の平均・中央値・SDをまず確認しておきましょう。</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">2</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">一元配置 ANOVA を実行する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">from scipy import stats<br>f_stat, p_value = stats.f_oneway(bronze, silver, gold)<br>print('F統計量:', round(f_stat,3), 'p値:', round(p_value,4))</div><div style="background:var(--color-background-success);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.7;margin:6px 0"><strong style="color:var(--color-text-primary)">結果の読み方</strong><br>p値 &lt; 0.05 → 少なくとも1群間に差あり → 多重比較へ進む<br>p値 ≥ 0.05 → 差があるとは言えない → ここで終了</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">3</span><div style="width:1px;flex:1;background:var(--color-border-secondary);margin-top:3px"></div></div><div style="padding-left:10px;padding-bottom:12px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">多重比較でどの群間に差があるか特定する</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)">（Tukey-Kramer 法：すべての組み合わせを比較したい場合）<br><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:8px 11px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);line-height:1.9;margin:5px 0">from statsmodels.stats.multicomp import pairwise_tukeyhsd<br>import numpy as np<br>data   = np.concatenate([bronze, silver, gold])<br>labels = ['bronze']*len(bronze) + ['silver']*len(silver) + ['gold']*len(gold)<br>result = pairwise_tukeyhsd(data, labels, alpha=0.05)<br>print(result)</div><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">出力の見方</div>group1 vs group2 の列に "True/False" が表示されます。<br>True → その組み合わせに有意差あり ／ False → 有意差なし</div></div></div></div><div style="display:flex;gap:0;margin-bottom:0"><div style="width:22px;flex-shrink:0;display:flex;flex-direction:column;align-items:center"><span style="width:20px;height:20px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">4</span></div><div style="padding-left:10px;padding-bottom:4px;flex:1"><div style="font-weight:500;font-size:12.5px;color:var(--color-text-primary);margin-bottom:5px">結果をまとめる</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><div style="background:rgba(0,0,0,0.03);border:0.5px solid var(--color-border-secondary);border-radius:6px;padding:9px 12px;font-size:11.5px;line-height:1.75;margin:6px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">報告例</div>3つの会員ランク間でLTVに有意差が認められた（一元配置ANOVA、F=12.4、p&lt;0.001）。<br>Tukey-Kramer 法による多重比較の結果、ゴールド会員はブロンズ・シルバー会員と比較して有意に高いLTVを示した（p&lt;0.01）。</div></div></div></div></div><h3>結果の読み方・解釈パターン</h3><div style="margin-top:4px"><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン1  ANOVA有意・多重比較で全ランクに差</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">F=12.4, p<0.001, 全ペアに有意差</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">3ランク間すべてに統計的に有意な差があると確認できた状態。</strong><br>「どのランク間に差があるか」まで多重比較で特定できています。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">ランク別の施策設計の根拠が揃った</strong>：ブロンズ→シルバー→ゴールドと段階的に客単価が上がることが確認できました。ランクごとに異なる施策を設計する正当性があります。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">ランクアップ促進施策の優先順位が決まる</strong>：中央値差が最大のランク間（例：シルバー→ゴールド間）への引き上げ施策が最大のLTVインパクトをもたらします。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">ANOVA有意 = 全ペアに差があるわけではない</strong>：多重比較の結果を必ず確認してください。「F値が有意だったからどのランク間にも差がある」は誤りです。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">報告の注意点</strong>：「一元配置ANOVA、F(df_between, df_within)=12.4、p&lt;0.001」の形式で自由度も記載してください。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">「どのランク間に差があるか」まで特定できると施策設計が具体的になります。効果量を確認することで、ランク差が施策投資に見合う大きさかどうかを判断できます。ANOVAは「どこかに差がある」という全体検定なので、多重比較で「どこに差があるか」を追加確認することが実務上必須です。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">eta-squaredで効果量を算出</strong>：eta² = SS_between / SS_total。0.06以上が中程度の効果。</span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">ランク別施策設計</strong>：どのランク間の差が最大かを確認し施策優先度に反映。</span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">eta² ≥ 0.14（大）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ランクが客単価に大きく影響している。ランク別施策（特典・体験の差別化）を強化する根拠として有力です。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">eta² = 0.06〜0.14（中）</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">中程度の影響。ランク別施策は有効ですが、ランク以外の要因も同時に検討してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">ゴールドのみ他と差あり</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ゴールド引き上げ施策に最大のLTVインパクトが見込めます。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">シルバー⇔ブロンズ差が大</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ブロンズ→シルバー引き上げ（母数が多い）が全体貢献の観点で優先度が高い可能性があります。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン2  ANOVA有意・一部のランク間のみ差</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">F=8.2, p=0.003, Tukey: ゴールドのみ他と有意差</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">ANOVAは全体として「どこかに差がある」ことを示しているが、差はゴールドだけに集中している状態。</strong><br>ブロンズ-シルバー間は統計的に差があるとは言えません。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-success)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">ゴールド向け施策には明確な根拠がある</strong>：ゴールド会員の客単価が他の2ランクと有意に異なることが確認できています。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">ブロンズ-シルバー間の差別化施策には根拠が薄い</strong>：統計的に差がない2群を「差がある」として扱った施策は、ROIが見込みにくいです。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">「ゴールド以上か否か」の二分割で考えるのが有効かもしれない</strong>：ゴールドとそれ以外の2グループで再分析して比較してみてください。</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">ゴールドだけが突出している原因を特定することで、「他のランクをゴールドに近づける施策」の設計ができます。また「なぜブロンズとシルバーに差が出ないのか」を分析することで、現行のランク制度の問題点（ランクアップ特典が不十分など）が見えてきます。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">ブロンズ→シルバー転換率の分析</strong>：ランクアップ達成条件と達成率を確認。</span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">ゴールド会員の行動特性分析</strong>：他ランクへの横展開施策を設計できます。</span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">ブロンズ-シルバー間で行動ログも差がない</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">現行のランク制度がブロンズ-シルバー間の差別化を生み出せていません。ランクアップ特典の魅力化が必要です。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-success);font-size:10px;font-weight:500;color:var(--color-text-success);line-height:1.5;display:flex;align-items:center">ゴールド特有の行動パターンが判明</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">その行動を他ランクへ促す行動変容施策を設計できます。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">ゴールド転換率が著しく低い</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ゴールドの客単価は高いが到達するユーザーが少ない。ランクアップ条件の難易度調整を検討してください。</div></div></div></div></div></div><div style="border:0.5px solid var(--color-border-secondary);border-radius:8px;overflow:hidden;margin-bottom:8px"><div style="display:flex;gap:0;align-items:stretch"><div style="width:4px;flex-shrink:0;background:var(--color-background-info)"></div><div style="padding:9px 12px;flex:1"><div style="font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">パターン3  ANOVA有意差なし</div><div style="display:inline-block;background:rgba(0,0,0,0.04);border-radius:4px;padding:3px 8px;font-family:var(--font-mono);font-size:10.5px;color:var(--color-text-primary);margin-bottom:6px">F=1.6, p=0.21</div><div style="font-size:11.5px;line-height:1.75;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">3群間で客単価の平均値に有意差は見られなかった。多重比較は実施しません。</strong><br>ANOVA が有意でないのに多重比較を行う（fishing）のは統計的に誤りです。</div><div style="margin-top:7px"><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-danger)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">ランク制度が購買行動の差別化につながっていない可能性</strong>：同じ金額を使うユーザーが全ランクにいる状態です。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-warning)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">サンプルが少ない可能性もある</strong>：特にゴールド会員が少ない場合は検出力不足を疑ってください。</span></div><div style="display:flex;gap:7px;margin-bottom:4px;align-items:baseline"><span style="flex-shrink:0;font-size:14px;line-height:1;color:var(--color-text-tertiary)">&#8227;</span><span style="font-size:11.5px;line-height:1.7"><strong style="color:var(--color-text-primary)">正しい報告</strong>：「一元配置ANOVAの結果、3群間に有意差は認められなかった（F=1.6, p=0.21）。多重比較は実施しなかった。」</span></div></div><div style="background:var(--color-background-secondary);border-radius:5px;padding:7px 10px;margin-top:7px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:4px">追加分析が必要な理由</div><div style="font-size:11px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:8px;border-left:2px solid var(--color-border-secondary);padding-left:8px">有意差なしの原因が「サンプル不足」なのか「本当に差がない」のかで、次のアクションが全く変わります。また「ランク以外の軸」で差が出るなら、現行のランク制度の設計自体に問題があるというシグナルになります。</div><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">実施すべき分析</div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-warning);color:var(--color-text-warning);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">!</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">ランク制度の効果検証</strong>：特典の魅力・ランクアップ条件・体験差を見直し。</span></div><div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:3px"><span style="flex-shrink:0;width:16px;height:16px;border-radius:50%;background:var(--color-background-info);color:var(--color-text-info);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">+</span><span style="font-size:11px;line-height:1.65;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">別軸での再分析</strong>：ログイン頻度・ポイント残高・継続期間で再グループ分け。</span></div></div><div style="border-top:0.5px solid var(--color-border-tertiary);padding-top:8px;margin-top:8px"><div style="font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:6px">追加分析の結果&#8594;示唆パターン</div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-warning);font-size:10px;font-weight:500;color:var(--color-text-warning);line-height:1.5;display:flex;align-items:center">別軸で有意差が出る</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">ランクより「行動ベースのセグメント」の方が客単価を説明できる。ランク定義を行動指標ベースに再設計することを検討してください。</div></div><div style="display:flex;gap:0;margin-bottom:5px;border-radius:5px;overflow:hidden;border:0.5px solid var(--color-border-secondary)"><div style="flex-shrink:0;width:90px;padding:6px 8px;background:var(--color-background-danger);font-size:10px;font-weight:500;color:var(--color-text-danger);line-height:1.5;display:flex;align-items:center">どの軸でも差が出ない</div><div style="padding:6px 9px;font-size:11px;line-height:1.6;color:var(--color-text-secondary);flex:1">全ユーザーが均質な購買行動をしている可能性。セグメント戦略そのものの有効性を再評価してください。</div></div></div></div></div></div></div><div class="warn-box"><strong style="color:var(--color-text-primary)">注意：</strong>ANOVA で p≥0.05 の場合は多重比較を行いません。</div>`,

"/><text x="65" y="36" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#4B8FD4">中央値A</text><text x="85" y="46" text-anchor="middle" font-family="sans-serif" font-size="7.5" fill="#D4843A">中央値B</text><text x="170" y="96" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#8A8A8A">→ 少数の高額ユーザーが分布を引っ張る</text></svg></div><h3>データ構成</h3><div style="font-size:11.5px;line-height:1.7;color:var(--color-text-secondary);margin-bottom:8px">検定を実行するために、以下の形式にデータを準備してください。</div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">① 元データの形（1行 = 1ユーザー）</div><div style="overflow-x:auto;margin:5px 0 0 0"><table style="border-collapse:collapse;width:100%;min-width:max-content"><tr><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">user_id</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">campaign</th><th style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);background:rgba(0,0,0,0.05);font-size:10.5px;font-weight:500;white-space:nowrap;text-align:left">point_spend</th></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U001</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">A</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">2,800</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U002</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">A</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">450</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U003</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">B</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">1,200</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">U004</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">B</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">18,400</td></tr><tr><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:left">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td><td style="padding:4px 9px;border:0.5px solid var(--color-border-secondary);font-size:10.5px;white-space:nowrap;text-align:center">…</td></tr></table></div><div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px">campaign 列でA/Bを区別し、比較したい指標列（point_spend）を用意します。欠損値のある行は事前に除外してください。</div></div><div style="margin:0 0 14px 0"><div style="font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:5px">② 検定用に2変数に分割（加工コード）</div><div style="background:rgba(0,0,0,0.04);border-radius:5px;padding:7px 10px;font-family:var(--font-mono);font-size:10.5px;color
